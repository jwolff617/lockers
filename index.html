function attRow(p){return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:.5px solid rgba(0,0,0,.06);cursor:pointer" onclick="attSelect('${p.id}')"><div class="avatar" style="width:26px;height:26px;font-size:10px">${p.first[0]}${p.last[0]}</div><div style="flex:1"><div style="font-size:13px">${p.first} ${p.last}</div><div style="font-size:11px;color:#888">${p.lockers.map(n=>'#'+n).join(', ')||'No lockers'}</div></div><span class="badge badge-${p.status}" style="font-size:10px">${p.status}</span></div>`}
function bulkRow(p){const s=_bulkSel[p.id];return`<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-bottom:.5px solid rgba(0,0,0,.06);cursor:pointer;background:${s?'#e6f1fb':'transparent'}" onclick="bulkToggle('${p.id}')"><div style="width:18px;height:18px;border-radius:4px;border:1.5px solid ${s?'#378add':'rgba(0,0,0,.3)'};background:${s?'#378add':'transparent'};color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${s?'✓':''}</div><div class="avatar" style="width:24px;height:24px;font-size:10px">${p.first[0]}${p.last[0]}</div><div style="flex:1;font-size:13px">${p.first} ${p.last}</div><span class="badge badge-${p.status}" style="font-size:10px">${p.status}</span></div>`}
function attTab(t){document.getElementById('att-t1').className='tab'+(t==='single'?' active':'');document.getElementById('att-t2').className='tab'+(t==='bulk'?' active':'');document.getElementById('att-single').style.display=t==='single'?'block':'none';document.getElementById('att-bulk').style.display=t==='bulk'?'block':'none'}
function attSearch(){const q=(document.getElementById('att-sq')||{value:''}).value.toLowerCase();const el=document.getElementById('att-list');if(!el)return;el.innerHTML=S.participants.filter(p=>!p.isPast&&(!q||`${p.first} ${p.last}`.toLowerCase().includes(q))).map(attRow).join('')}
function bulkSearch(){const q=(document.getElementById('bulk-sq')||{value:''}).value.toLowerCase();const el=document.getElementById('bulk-list');if(!el)return;el.innerHTML=S.participants.filter(p=>!p.isPast&&(!q||`${p.first} ${p.last}`.toLowerCase().includes(q))).map(bulkRow).join('')}
function attTypeChange(){const t=(document.getElementById('att-type')||{value:'work'}).value;const l=document.getElementById('att-dl');if(l)l.textContent={work:'Work shift date',meeting:'Meeting date','power-lunch':'Power Lunch date','locker-checkin':'Check-in date'}[t]||'Date';// Show assigned dates if work
  const adv=document.getElementById('att-assigned-dates');if(adv){if(t==='work'&&_selA){const p=S.participants.find(x=>x.id===_selA);const cm=monthKey(SYS_DATE);const asgn=(p?.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});if(asgn.length)adv.innerHTML=`<div style="font-size:12px;color:#666;margin-bottom:6px"><b>Assigned dates this month:</b> ${asgn.map(d=>`<span class="tag" style="cursor:pointer" onclick="document.getElementById('att-date').value='${d}'">${fmtDate(d)}</span>`).join('')} <span style="color:#aaa">(click to select)</span></div>`;else adv.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:6px">No assigned work dates this month — EC can add from participant profile.</div>';}else adv.innerHTML=''}}
function bulkTypeChange(){const t=(document.getElementById('bulk-type')||{value:'work'}).value;const l=document.getElementById('bulk-dl');if(l)l.textContent={work:'Work shift date',meeting:'Meeting date','power-lunch':'Power Lunch date','locker-checkin':'Check-in date'}[t]||'Date'}
function attSelect(id){_selA=id;const p=S.participants.find(x=>x.id===id);if(!p)return;const lm=lastMtgDate(id);document.getElementById('att-who').textContent=`${p.first} ${p.last} · ${p.lockers.length} locker(s) · ${p.status}${lm?' · Last meeting: '+fmtDate(lm):''}`;document.getElementById('att-confirm').style.display='block';document.getElementById('att-list').style.display='none';attTypeChange()}
function lastMtgDate(pid){const r=(S.attendance||[]).filter(a=>a.participantId===pid&&a.type==='meeting');if(!r.length)return null;r.sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date));return r[0].recordedDate||r[0].date}
function bulkToggle(id){if(_bulkSel[id])delete _bulkSel[id];else _bulkSel[id]=true;refreshBulk()}
function refreshBulk(){bulkSearch();const c=document.getElementById('bulk-chips');if(!c)return;const ids=Object.keys(_bulkSel);c.innerHTML=ids.length?ids.map(id=>{const p=S.participants.find(x=>x.id===id);return p?`<span class="tag" style="background:#e6f1fb;color:#185fa5">${p.first} ${p.last} <span onclick="bulkToggle('${id}')" style="cursor:pointer;opacity:.7">×</span></span>`:''}).join(''):'<span style="font-size:12px;color:#aaa">None selected</span>'}
function writeAtt(p,type,recordedDate){
  const now=new Date();const ts=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  if(!S.attendance)S.attendance=[];
  S.attendance.push({id:'a'+Date.now()+Math.random().toString(36).slice(2),participantId:p.id,date:todayStr(),recordedDate,time:ts,type});
  if(type==='work'&&recordedDate){
    if(p.missedDateWarnings){const w=p.missedDateWarnings.find(x=>!x.resolved);if(w){w.resolved=true;audit('MISS_RESOLVED',p.id,'Replacement work date submitted: '+recordedDate)}}
  }
  audit('ATTENDANCE',p.id,type+' recorded for '+fmtDate(recordedDate));
}
function applyCredits(p){
  const cm=monthKey(SYS_DATE);
  const assignedThisMo=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});
  const checkedIn=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='work'&&monthKey(parseDate(a.recordedDate||a.date)||SYS_DATE)===cm).map(a=>a.recordedDate||a.date);
  const met=assignedThisMo.filter(d=>checkedIn.includes(d)).length;
  const extra=met-p.lockers.length;
  if(extra>0){p.credits=(p.credits||0)+extra;if(!p.creditLog)p.creditLog=[];p.creditLog.push({date:todayStr(),adj:extra,by:'System',reason:'Extra shift(s) worked',balance:p.credits});toast('Credit earned! '+p.first+' now has '+p.credits)}
}
function doSingleAtt(){const p=S.participants.find(x=>x.id===_selA);if(!p)return;const type=(document.getElementById('att-type')||{value:'work'}).value;const dt=(document.getElementById('att-date')||{value:todayStr()}).value||todayStr();writeAtt(p,type,dt);applyCredits(p);refreshAll();save();closeModal();S.page='attendance';render();toast('✓ '+type+' recorded for '+p.first+' — '+fmtDate(dt))}
function doBulkAtt(){const ids=Object.keys(_bulkSel);if(!ids.length){alert('No participants selected.');return}const type=(document.getElementById('bulk-type')||{value:'work'}).value;const dt=(document.getElementById('bulk-date')||{value:todayStr()}).value||todayStr();ids.forEach(id=>{const p=S.participants.find(x=>x.id===id);if(p){writeAtt(p,type,dt);applyCredits(p)}});_bulkSel={};refreshAll();save();closeModal();S.page='attendance';render();toast('✓ '+type+' for '+ids.length+' participants — '+fmtDate(dt))}

// ── LOCKERS ────────────────────────────────────────────────────────────────
function pgLockers(){const c={available:S.lockers.filter(l=>l.status==='available').length,active:S.lockers.filter(l=>l.status==='active').length,barred:S.lockers.filter(l=>l.status==='barred').length,broken:S.lockers.filter(l=>!l.working).length};return`<div class="metric-grid"><div class="metric"><div class="metric-label">Available</div><div class="metric-value" style="color:#3b6d11">${c.available}</div></div><div class="metric"><div class="metric-label">Active</div><div class="metric-value" style="color:#185fa5">${c.active}</div></div><div class="metric"><div class="metric-label">Barred</div><div class="metric-value" style="color:#854f0b">${c.barred}</div></div><div class="metric"><div class="metric-label">Broken</div><div class="metric-value" style="color:#a32d2d">${c.broken}</div></div><div class="metric"><div class="metric-label">Total</div><div class="metric-value">${S.lockers.length}</div></div></div>
  <div class="card"><div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap"><select id="lk-f" onchange="renderLockerGrid()" style="width:160px"><option value="">All lockers</option><option value="available">Available</option><option value="active">Active</option><option value="barred">Barred</option><option value="broken">Broken</option></select><div class="search-bar" style="max-width:200px"><i class="ti ti-search"></i><input type="text" id="lk-s" placeholder="Number…" oninput="renderLockerGrid()"></div></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:12px"><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#eaf3de;border:1px solid #c0dd97;margin-right:4px"></span>Available</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#e6f1fb;border:1px solid #b5d4f4;margin-right:4px"></span>Active</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#faeeda;border:1px solid #fac775;margin-right:4px"></span>Barred</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#fcebeb;border:1px solid #f7c1c1;margin-right:4px"></span>Broken</span></div>
  <div class="locker-grid" id="locker-grid"></div></div>`}
function renderLockerGrid(){const f=(document.getElementById('lk-f')||{value:''}).value;const s=(document.getElementById('lk-s')||{value:''}).value;let ls=S.lockers;if(f==='available')ls=ls.filter(l=>l.status==='available');else if(f==='active')ls=ls.filter(l=>l.status==='active');else if(f==='barred')ls=ls.filter(l=>l.status==='barred');else if(f==='broken')ls=ls.filter(l=>!l.working);if(s)ls=ls.filter(l=>String(l.number).includes(s));const el=document.getElementById('locker-grid');if(!el)return;el.innerHTML=ls.slice(0,200).map(l=>{const cls={available:'lc-available',active:'lc-active',barred:'lc-barred',broken:'lc-broken'}[l.status]||'lc-inactive';const p=l.assignedTo?S.participants.find(x=>x.id===l.assignedTo):null;return`<div class="locker-cell ${cls}" onclick="lockerDetail(${l.number})" title="${p?p.first+' '+p.last:l.status}"><span>#${l.number}</span>${p?`<span style="font-size:9px;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.last}</span>`:''}</div>`}).join('')+(ls.length>200?`<div style="padding:10px;color:#888;font-size:12px">${ls.length-200} more — use filter</div>`:'')}
function lockerDetail(num){const l=S.lockers.find(x=>x.number===num);if(!l)return;const p=l.assignedTo?S.participants.find(x=>x.id===l.assignedTo):null;const info=`Locker #${num}\nStatus: ${l.status}\nWorking: ${l.working?'Yes':'No'}${l.problem?' ('+l.problem+')':''}\n${p?'Assigned: '+p.first+' '+p.last+'\nRenewal: '+fmtDate(p.renewalDate):'Unassigned'}`;if(p&&confirm(info+'\n\nUnassign this locker?'))doUnassignLocker(num,p.id);else if(!p)alert(info)}
function doUnassignLocker(num,pid){const l=S.lockers.find(x=>x.number===num);const p=S.participants.find(x=>x.id===pid);if(!l||!p)return;l.status='available';l.assignedTo=null;p.lockers=p.lockers.filter(x=>x!==num);if(!p.oldLockers)p.oldLockers=[];p.oldLockers.push(num);audit('UNASSIGN_LOCKER',pid,'Locker #'+num+' unassigned');refreshAll();save();render();toast('Locker #'+num+' unassigned from '+p.first+' '+p.last)}

// ── RENEWALS ───────────────────────────────────────────────────────────────
function pgRenewals(){const ps=S.participants.filter(p=>!p.isPast&&p.lockers.length>0);const soon=ps.filter(p=>{const rd=parseDate(p.renewalDate);return rd&&daysBetween(SYS_DATE,rd)<=14&&daysBetween(SYS_DATE,rd)>=0});const exp=ps.filter(p=>{const rd=parseDate(p.renewalDate);return rd&&rd<SYS_DATE});return`<div class="tab-bar"><div class="tab active" id="rn-t1" onclick="rnTab('soon')">Due soon (${soon.length})</div><div class="tab" id="rn-t2" onclick="rnTab('exp')">Expired / non-renewal (${exp.length})</div></div>
  <div id="rn-soon"><div class="alert alert-info"><i class="ti ti-info-circle"></i> Renewals must be completed by the 15th. Locker goes inactive on the 16th of the following month as "non-renewal given."</div>
  <div class="card" style="padding:0"><table><thead><tr><th>Participant</th><th>Lockers</th><th>Renewal</th><th>Days left</th><th></th></tr></thead><tbody>${soon.length?soon.map(p=>{const rd=parseDate(p.renewalDate);const d=daysBetween(SYS_DATE,rd);return`<tr><td>${p.first} ${p.last}</td><td>${p.lockers.map(n=>`<span class="pill-locker">#${n}</span>`).join('')}</td><td>${fmtDate(p.renewalDate)}</td><td><span class="badge ${d<=3?'badge-inactive':d<=7?'badge-barred':'badge-pending'}">${d}d</span></td><td><button class="btn btn-sm btn-primary" onclick="openModal('renew','${p.id}')">Renew</button></td></tr>`}).join(''):'<tr><td colspan="5" style="text-align:center;color:#888;padding:16px">None due in 14 days</td></tr>'}</tbody></table></div></div>
  <div id="rn-exp" style="display:none"><div class="alert alert-danger"><i class="ti ti-alert-triangle"></i> These participants have not renewed. Check "Hold" to delay release (e.g. they still need to collect belongings). Non-held lockers should be released.</div>
  <div class="card" style="padding:0"><table><thead><tr><th>Participant</th><th>Locker</th><th>Expired</th><th>Hold?</th><th></th></tr></thead><tbody>${exp.length?exp.flatMap(p=>p.lockers.map(n=>{const held=(S._heldLockers||[]).includes(n);return`<tr><td>${p.first} ${p.last}</td><td><span class="pill-locker">#${n}</span></td><td>${fmtDate(p.renewalDate)}</td><td><input type="checkbox" ${held?'checked':''} onchange="toggleHold(${n},this.checked)"></td><td><button class="btn btn-sm btn-danger" onclick="releaseLkr(${n},'${p.id}')">Release</button></td></tr>`})).join(''):'<tr><td colspan="5" style="text-align:center;color:#888;padding:16px">No expired renewals</td></tr>'}</tbody></table></div></div>`;
}
function rnTab(t){document.getElementById('rn-t1').className='tab'+(t==='soon'?' active':'');document.getElementById('rn-t2').className='tab'+(t==='exp'?' active':'');document.getElementById('rn-soon').style.display=t==='soon'?'block':'none';document.getElementById('rn-exp').style.display=t==='exp'?'block':'none'}
function toggleHold(n,held){if(!S._heldLockers)S._heldLockers=[];if(held){if(!S._heldLockers.includes(n))S._heldLockers.push(n)}else S._heldLockers=S._heldLockers.filter(x=>x!==n);save()}
function releaseLkr(num,pid){if(!confirm(`Release locker #${num}?`))return;const l=S.lockers.find(x=>x.number===num);if(l){l.status='available';l.assignedTo=null}const p=S.participants.find(x=>x.id===pid);if(p){p.lockers=p.lockers.filter(x=>x!==num);if(!p.oldLockers)p.oldLockers=[];p.oldLockers.push(num)}if(S._heldLockers)S._heldLockers=S._heldLockers.filter(x=>x!==num);audit('RELEASE_LOCKER',pid,'Locker #'+num+' released after non-renewal');refreshAll();save();render();toast('Locker #'+num+' released.')}

// ── BARS & RECOMMENDATIONS ─────────────────────────────────────────────────
function pgBars(){
  const all=S.participants.flatMap(p=>(p.bars||[]).map(b=>({...b,pid:p.id,name:p.first+' '+p.last})));
  const active=all.filter(b=>b.permanent||(parseDate(b.endDate)>=SYS_DATE&&!b.expired));
  const hist=all.filter(b=>!b.permanent&&(b.expired||parseDate(b.endDate)<SYS_DATE));
  // Bar recommendations: inactive with lockers
  const reco=S.participants.filter(p=>!p.isPast&&p.status==='inactive'&&p.lockers.length>0);
  const warns=S.participants.filter(p=>!p.isPast&&(p.missedDateWarnings||[]).some(w=>!w.resolved));
  return`<div class="tab-bar"><div class="tab active" id="br-t1" onclick="brTab('reco')">Recommendations (${reco.length+warns.length})</div><div class="tab" id="br-t2" onclick="brTab('active')">Active bars (${active.length})</div><div class="tab" id="br-t3" onclick="brTab('hist')">History (${hist.length})</div></div>
  <div id="br-reco">
    <div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> The system flags these participants for EC review. Only ECs can issue bars. A bar means the participant loses access to their locker contents.</div>
    ${reco.length?`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Inactive participants with active lockers (${reco.length})</div><div class="card" style="padding:0;margin-bottom:12px"><table><thead><tr><th>Participant</th><th>Lockers</th><th>Reason for inactivity</th><th></th></tr></thead><tbody>
    ${reco.map(p=>`<tr><td style="cursor:pointer;color:#378add" onclick="viewP('${p.id}')">${p.first} ${p.last}</td><td>${p.lockers.map(n=>`<span class="pill-locker">#${n}</span>`).join('')}</td><td style="font-size:11px;color:#888">${p.statusReason}</td><td style="white-space:nowrap"><button class="btn btn-sm btn-danger" onclick="openModal('bar','${p.id}')"><i class="ti ti-ban"></i> Issue bar</button></td></tr>`).join('')}
    </tbody></table></div>`:''}
    ${warns.length?`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Open missed-date warnings (${warns.length})</div><div class="card" style="padding:0"><table><thead><tr><th>Participant</th><th>Missed date</th><th>Deadline</th><th>Days left</th><th></th></tr></thead><tbody>
    ${warns.map(p=>{const w=p.missedDateWarnings.find(x=>!x.resolved);const dl=parseDate(w.deadline);const days=dl?daysBetween(SYS_DATE,dl):0;return`<tr><td>${p.first} ${p.last}</td><td>${fmtDate(w.missedDate)}</td><td>${fmtDate(w.deadline)}</td><td style="color:${days<=3?'#e24b4a':'#ba7517'}">${days}d</td><td style="white-space:nowrap"><button class="btn btn-sm btn-danger" onclick="forceBar('${p.id}')">Bar now</button></td></tr>`}).join('')}</tbody></table></div>`:''}
    ${!reco.length&&!warns.length?'<div class="card"><p style="color:#888;font-size:13px">No bar recommendations at this time.</p></div>':''}
  </div>
  <div id="br-active" style="display:none">${active.length?`<div class="card" style="padding:0"><table><thead><tr><th>Participant</th><th>Type</th><th>Reason</th><th>Issued by</th><th>Issued</th><th>Until</th></tr></thead><tbody>${active.map(b=>`<tr><td style="cursor:pointer;color:#378add" onclick="viewP('${b.pid}')">${b.name}</td><td><span class="badge ${b.permanent?'badge-inactive':'badge-barred'}">${b.permanent?'Permanent':'Temp'}</span></td><td>${b.reason}</td><td style="font-size:11px;color:#888">${b.issuedBy||'EC'}</td><td>${fmtDate(b.startDate)}</td><td>${b.permanent?'Forever':fmtDate(b.endDate)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="card"><p style="color:#888;font-size:13px">No active bars.</p></div>'}</div>
  <div id="br-hist" style="display:none">${hist.length?`<div class="card" style="padding:0"><table><thead><tr><th>Participant</th><th>Reason</th><th>Issued by</th><th>Period</th></tr></thead><tbody>${hist.map(b=>`<tr><td>${b.name}</td><td>${b.reason}</td><td style="font-size:11px;color:#888">${b.issuedBy||'EC'}</td><td>${fmtDate(b.startDate)} – ${fmtDate(b.endDate)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="card"><p style="color:#888;font-size:13px">No bar history.</p></div>'}</div>`;
}
function brTab(t){['reco','active','hist'].forEach(x=>{const el=document.getElementById('br-'+x);const tab=document.getElementById('br-t'+({reco:1,active:2,hist:3}[x]));if(el)el.style.display=x===t?'block':'none';if(tab)tab.className='tab'+(x===t?' active':'')});const wt=document.getElementById('br-t1');if(wt)wt.className='tab'+(t==='reco'?' active':'')}
function forceBar(id){const p=S.participants.find(x=>x.id===id);if(!p)return;if(!confirm('Issue 30-day bar to '+p.first+' '+p.last+'?'))return;if(!p.bars)p.bars=[];const end=addDays(todayStr(),30);p.bars.push({id:'b'+Date.now(),startDate:todayStr(),endDate:end,permanent:false,reason:'Missed work date — 14-day deadline exceeded',issuedBy:S.currentUser?.name||'EC',auto:true});audit('BAR_ISSUED',id,'Force bar: missed date deadline exceeded');refreshAll();save();render();toast('Bar issued to '+p.first)}

// ── MESSAGES ───────────────────────────────────────────────────────────────
function pgMessages(){
  const msgs=S.messages||[];const grouped={};msgs.forEach(m=>{if(!grouped[m.participantId])grouped[m.participantId]=[];grouped[m.participantId].push(m)});
  const pIds=Object.keys(grouped);const activeId=S._activeThread||(pIds.length?pIds[0]:null);
  if(activeId&&grouped[activeId])grouped[activeId].forEach(m=>{if(m.fromRole==='participant')m.read=true});
  return`<div style="display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 120px);border:.5px solid rgba(0,0,0,.12);border-radius:10px;overflow:hidden">
  <div style="border-right:.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;overflow:hidden;background:#f9f9f7">
    <div style="padding:10px 14px;font-size:11px;font-weight:500;color:#888;border-bottom:.5px solid rgba(0,0,0,.08)">Conversations</div>
    <div style="flex:1;overflow-y:auto">${pIds.map(pid=>{const p=S.participants.find(x=>x.id===pid);const unread=grouped[pid].filter(m=>!m.read&&m.fromRole==='participant').length;const last=grouped[pid][grouped[pid].length-1];return`<div style="padding:10px 14px;cursor:pointer;background:${pid===activeId?'#fff':'transparent'};border-bottom:.5px solid rgba(0,0,0,.07)" onclick="S._activeThread='${pid}';render()"><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:11px">${p?p.first[0]+p.last[0]:'?'}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:${unread?'500':'400'}">${p?p.first+' '+p.last:pid}</div><div style="font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${last?last.text.slice(0,30)+(last.text.length>30?'…':''):''}</div></div>${unread?`<span class="nav-badge">${unread}</span>`:''}</div></div>`}).join('')}${!pIds.length?'<div style="padding:16px;font-size:13px;color:#888">No conversations yet.</div>':''}</div>
  </div>
  <div style="display:flex;flex-direction:column;overflow:hidden">${activeId&&grouped[activeId]?`
    <div style="padding:12px 16px;border-bottom:.5px solid rgba(0,0,0,.1);font-weight:500;font-size:14px">${(()=>{const p=S.participants.find(x=>x.id===activeId);return p?p.first+' '+p.last:activeId})()} </div>
    <div class="chat-area" style="flex:1" id="chat-scroll">${grouped[activeId].map(m=>`<div><div class="chat-msg ${m.fromRole==='ec'||m.fromRole==='clerk'?'chat-from-ec':'chat-from-p'}">${m.text}</div><div class="chat-meta" style="text-align:${m.fromRole==='ec'||m.fromRole==='clerk'?'right':'left'}">${fmtDate(m.date)} · ${m.fromRole==='participant'?'Participant':'EC/Staff'}</div></div>`).join('')}</div>
    <div style="padding:12px 16px;border-top:.5px solid rgba(0,0,0,.1);display:flex;gap:8px"><input type="text" id="msg-in" placeholder="Type a message…" style="flex:1" onkeydown="if(event.key==='Enter')sendMsg('${activeId}')"><button class="btn btn-primary btn-sm" onclick="sendMsg('${activeId}')"><i class="ti ti-send"></i></button></div>`:'<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px">Select a conversation or start a new one</div>'}
  </div></div>`;
}
function sendMsg(pid){const inp=document.getElementById('msg-in');if(!inp||!inp.value.trim())return;if(!S.messages)S.messages=[];S.messages.push({id:'m'+Date.now(),participantId:pid,text:inp.value.trim(),date:todayStr(),fromRole:S.currentUser.role,read:S.currentUser.role!=='participant'});save();S._activeThread=pid;render()}
function openNewMsg(){const email=prompt('Participant email:');if(!email)return;const p=S.participants.find(x=>x.email.toLowerCase()===email.toLowerCase());if(!p){alert('Not found.');return}S._activeThread=p.id;render()}
function sendParticipantMessage(){const t=(document.getElementById('p-msg-txt')||{value:''}).value.trim();if(!t){alert('Enter a message.');return}if(!S.messages)S.messages=[];S.messages.push({id:'m'+Date.now(),participantId:S.currentUser.id,text:t,date:todayStr(),fromRole:'participant',read:false});document.getElementById('p-msg-txt').value='';save();toast('Message sent to your EC.')}

// ── PARTICIPANT PROFILE (mobile) ───────────────────────────────────────────
function pgMyProfile(){const p=S.participants.find(x=>x.id===S.currentUser?.id);if(!p)return'<p>Not found.</p>';const cm=monthKey(SYS_DATE);const assignedThisMo=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});const checkedIn=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='work'&&monthKey(parseDate(a.recordedDate||a.date)||SYS_DATE)===cm).map(a=>a.recordedDate||a.date);const metCount=assignedThisMo.filter(d=>checkedIn.includes(d)).length;const rd=parseDate(p.renewalDate);const dl=rd?daysBetween(SYS_DATE,rd):null;const activeBars=(p.bars||[]).filter(b=>b.permanent||(parseDate(b.endDate)>=SYS_DATE&&!b.expired));return`<div class="card" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><div class="avatar" style="width:50px;height:50px;font-size:18px">${p.first[0]}${p.last[0]}</div><div><div style="font-size:18px;font-weight:500">${p.first} ${p.last}</div><div style="font-size:12px;color:#888">${p.email}</div><span class="badge badge-${p.status}" style="margin-top:4px">${p.status}</span></div></div>${activeBars.length?`<div class="alert alert-danger"><i class="ti ti-ban"></i> You have an active bar. Contact your EC.</div>`:''}${p.statusReason?`<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> ${p.statusReason}</div>`:''}${dl!==null&&dl<=14&&dl>=0?`<div class="alert alert-warning"><i class="ti ti-calendar"></i> Renewal due in ${dl} days (${fmtDate(p.renewalDate)})</div>`:''}
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div class="metric"><div class="metric-label">Lockers</div><div class="metric-value">${p.lockers.length}</div>${p.lockers.map(n=>`<span class="tag">#${n}</span>`).join('')}</div><div class="metric"><div class="metric-label">Work this month</div><div class="metric-value" style="color:${metCount>=p.lockers.length?'#3b6d11':'#e24b4a'}">${metCount}/${p.lockers.length}</div></div><div class="metric"><div class="metric-label">Credits</div><div class="metric-value">${p.credits||0}</div></div></div></div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px">Compliance checklist</div>
  ${[['Meeting (30-day window)',p.meetingStatus],['Power Lunch '+SYS_DATE.getFullYear(),p.plStatus],['Work dates this month',metCount>=p.lockers.length]].map(([lbl,ok])=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.06)"><i class="ti ti-${ok?'circle-check':'circle-x'}" style="color:${ok?'#3b6d11':'#e24b4a'};font-size:20px"></i><span style="font-size:13px;flex:1">${lbl}</span><span class="badge ${ok?'badge-active':'badge-inactive'}">${ok?'✓ OK':'✗ Missing'}</span></div>`).join('')}</div>
  <div class="card" style="margin-top:12px"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Your assigned work dates this month</div>${assignedThisMo.length?assignedThisMo.map(d=>{const met=checkedIn.includes(d);return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid rgba(0,0,0,.06)"><i class="ti ti-${met?'circle-check':'circle-x'}" style="color:${met?'#3b6d11':'#e24b4a'};font-size:16px"></i><span style="font-size:13px">${fmtDate(d)}</span><span class="badge ${met?'badge-active':'badge-inactive'}" style="margin-left:auto">${met?'Checked in':'Not yet'}</span></div>`}).join(''):'<p style="color:#888;font-size:13px">No assigned dates this month. Contact your EC.</p>'}</div>`;
}
function pgMySchedule(){const p=S.participants.find(x=>x.id===S.currentUser?.id);if(!p)return'<p>Not found.</p>';const mtgs=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='meeting').sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date));const pls=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='power-lunch').sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date));const works=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='work').sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date)).slice(0,10);return`<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:500;margin-bottom:12px"><i class="ti ti-calendar"></i> Your schedule</div><div><div style="font-size:12px;color:#888;margin-bottom:4px">Renewal date</div><div style="font-size:15px;font-weight:500">${fmtDate(p.renewalDate)}</div></div><div class="divider"></div><div><div style="font-size:12px;color:#888;margin-bottom:4px">Assigned work dates</div>${(p.assignedWorkDates||[]).map(d=>`<span class="tag"><i class="ti ti-calendar" style="font-size:11px"></i>${fmtDate(d)}</span>`).join('')||'<span style="color:#888;font-size:12px">None assigned</span>'}</div><div class="divider"></div><div><div style="font-size:12px;color:#888;margin-bottom:4px">Recent work check-ins</div>${works.map(a=>`<span class="tag"><i class="ti ti-tool" style="font-size:11px"></i>${fmtDate(a.recordedDate||a.date)}</span>`).join('')||'<span style="color:#888;font-size:12px">None</span>'}</div><div class="divider"></div><div><div style="font-size:12px;color:#888;margin-bottom:4px">Meeting dates (last 3)</div>${mtgs.slice(0,3).map(a=>`<span class="tag"><i class="ti ti-users" style="font-size:11px"></i>${fmtDate(a.recordedDate||a.date)}</span>`).join('')||'<span style="color:#888;font-size:12px">None</span>'}</div><div class="divider"></div><div><div style="font-size:12px;color:#888;margin-bottom:4px">Power Lunch dates</div>${pls.map(a=>`<span class="tag"><i class="ti ti-star" style="font-size:11px"></i>${fmtDate(a.recordedDate||a.date)}</span>`).join('')||'<span style="color:#888;font-size:12px">None</span>'}</div></div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px"><i class="ti ti-message-circle"></i> Message your EC</div><div class="form-group"><textarea id="p-msg-txt" rows="3" placeholder="Question, reschedule request, running late…" style="resize:none"></textarea></div><button class="btn btn-primary btn-sm" onclick="sendParticipantMessage()"><i class="ti ti-send"></i> Send</button></div>`;
}

// ── REPORTS ────────────────────────────────────────────────────────────────
function pgReports(){
  const allMo=new Set();(S.attendance||[]).forEach(a=>{const d=parseDate(a.recordedDate||a.date);if(d)allMo.add(monthKey(d))});allMo.add(monthKey(SYS_DATE));
  const months=[...allMo].sort().reverse();if(!S._reportMonth)S._reportMonth=monthKey(SYS_DATE);
  const mk=S._reportMonth;const tab=S._reportTab||'work';
  return`<div class="rpt-ctrl no-print"><label style="font-size:12px;color:#666">Period:</label><select style="width:220px" onchange="S._reportMonth=this.value;render()">${months.map(m=>`<option value="${m}" ${m===mk?'selected':''}>${monthLabel(m)}</option>`).join('')}</select><span style="font-size:12px;color:#888;font-weight:500">${monthLabel(mk)}</span></div>
  <div class="tab-bar">${['work','meetings','powerlunch','renewals','nonrenewal','bars','participants','lockers','credits','credit-rollover','misses','audit','motions'].map(t=>`<div class="tab${tab===t?' active':''}" onclick="S._reportTab='${t}';render()">${rptTabLabel(t)}</div>`).join('')}</div>
  ${buildRpt(mk,tab)}`;
}

function rptTabLabel(t){return {work:'Work Shifts',meetings:'Meetings',powerlunch:'Power Lunches',renewals:'Renewals',nonrenewal:'Non-Renewals',bars:'Bars',participants:'Participants',lockers:'Lockers',credits:'Credits','credit-rollover':'Credit Rollover',misses:'Misses',audit:'Audit Log',motions:'Motions'}[t]||t}
function buildRpt(mk,tab){
  const[yr,mo]=mk.split('-').map(Number);const ps=S.participants;const att=S.attendance||[];
  const active=ps.filter(p=>!p.isPast);
  function inMo(s){const d=parseDate(s);return d&&d.getFullYear()===yr&&(d.getMonth()+1)===mo}
  function inYr(s){const d=parseDate(s);return d&&d.getFullYear()===yr}
  function tbl(cols,rows,empty){return`<div class="card" style="padding:0;overflow-x:auto"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${cols.length}" style="text-align:center;color:#888;padding:20px">${empty||'No data.'}</td></tr>`}</tbody></table></div>`}
  function mets(items){return`<div class="metric-grid">${items.map(([lbl,val,color])=>`<div class="metric"><div class="metric-label">${lbl}</div><div class="metric-value"${color?` style="color:${color}"`:''}>${val}</div></div>`).join('')}</div>`}

  if(tab==='work'){
    const recs=att.filter(a=>a.type==='work'&&inMo(a.recordedDate||a.date));
    const rows=active.map(p=>{
      const assigned=(p.assignedWorkDates||[]).filter(d=>inMo(d));
      const checkedIn=recs.filter(a=>a.participantId===p.id).map(a=>a.recordedDate||a.date);
      const met=assigned.filter(d=>checkedIn.includes(d)).length;
      const ok=met>=p.lockers.length;
      return`<tr><td>${p.first} ${p.last}</td><td>${p.lockers.map(n=>'#'+n).join(', ')||'—'}</td><td>${assigned.map(fmtDate).join(', ')||'—'}</td><td style="color:${ok?'#3b6d11':'#e24b4a'}">${met}/${p.lockers.length}</td><td><span class="badge ${ok?'badge-active':'badge-inactive'}">${ok?'Met':'Short '+(p.lockers.length-met)}</span></td></tr>`;
    });
    const met=active.filter(p=>{const assigned=(p.assignedWorkDates||[]).filter(d=>inMo(d));const ci=recs.filter(a=>a.participantId===p.id).map(a=>a.recordedDate||a.date);return assigned.filter(d=>ci.includes(d)).length>=p.lockers.length}).length;
    return mets([['Total shifts',recs.length],['Met requirement',met+'/'+active.length,'#3b6d11'],['Short',active.length-met,'#e24b4a']])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Work shift attendance — ${monthLabel(mk)}</div>`+tbl(['Name','Lockers','Assigned dates','Met/needed','Status'],rows);
  }
  if(tab==='meetings'){
    const recs=att.filter(a=>a.type==='meeting'&&inMo(a.recordedDate||a.date));const attended=new Set(recs.map(a=>a.participantId));
    const ago30=new Date(SYS_DATE);ago30.setDate(ago30.getDate()-30);
    const rows=active.map(p=>{const mr=recs.filter(a=>a.participantId===p.id);const cur=att.some(a=>{if(a.participantId!==p.id||a.type!=='meeting')return false;const d=parseDate(a.recordedDate||a.date);return d&&d>=ago30&&d<=SYS_DATE});return`<tr><td>${p.first} ${p.last}</td><td style="font-size:11px">${mr.map(a=>fmtDate(a.recordedDate||a.date)).join(', ')||'—'}</td><td>${mr.length}</td><td><span class="badge ${attended.has(p.id)?'badge-active':'badge-inactive'}">${attended.has(p.id)?'Attended':'Missed'}</span></td><td><span class="badge ${cur?'badge-active':'badge-inactive'}">${cur?'Valid':'None/expired'}</span></td></tr>`});
    return mets([['Meetings this month',recs.length],['Attended',attended.size,'#3b6d11'],['Missed',active.length-attended.size,'#e24b4a']])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Meeting attendance — ${monthLabel(mk)}</div>`+tbl(['Name','Dates this month','Count','Month status','30-day credit'],rows);
  }
  if(tab==='powerlunch'){
    const recs=att.filter(a=>a.type==='power-lunch'&&inYr(a.recordedDate||a.date));const attended=new Set(recs.map(a=>a.participantId));const thisMo=att.filter(a=>a.type==='power-lunch'&&inMo(a.recordedDate||a.date)).length;
    const rows=active.map(p=>{const mr=recs.filter(a=>a.participantId===p.id);return`<tr><td>${p.first} ${p.last}</td><td style="font-size:11px">${mr.map(a=>fmtDate(a.recordedDate||a.date)).join(', ')||'—'}</td><td>${mr.length}</td><td><span class="badge ${attended.has(p.id)?'badge-active':'badge-inactive'}">${attended.has(p.id)?'Complete':'Missing'}</span></td></tr>`});
    return mets([['PL records ('+yr+')',recs.length],['Completed',attended.size,'#3b6d11'],['Missing',active.length-attended.size,'#e24b4a'],['This month',thisMo]])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Power Lunch — ${yr}</div>`+tbl(['Name','Dates','Count','Status'],rows);
  }
  if(tab==='renewals'){
    const wl=active.filter(p=>p.lockers.length>0);const exp=wl.filter(p=>parseDate(p.renewalDate)&&parseDate(p.renewalDate)<SYS_DATE).length;const ds=wl.filter(p=>{const rd=parseDate(p.renewalDate);return rd&&daysBetween(SYS_DATE,rd)<=14&&daysBetween(SYS_DATE,rd)>=0}).length;
    const rows=wl.map(p=>{const rd=parseDate(p.renewalDate);const isExp=rd&&rd<SYS_DATE;const isSoon=rd&&!isExp&&daysBetween(SYS_DATE,rd)<=14;return`<tr><td>${p.first} ${p.last}</td><td>${p.lockers.map(n=>'#'+n).join(', ')}</td><td>${fmtDate(p.renewalDate)}</td><td><span class="badge ${isExp?'badge-inactive':isSoon?'badge-barred':'badge-active'}">${isExp?'Expired':isSoon?'Due soon':'Current'}</span></td><td>${rd&&!isExp?daysBetween(SYS_DATE,rd)+'d left':'—'}</td></tr>`});
    return mets([['With lockers',wl.length],['Due (14d)',ds,'#ba7517'],['Expired',exp,'#e24b4a']])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Renewal status</div>`+tbl(['Name','Lockers','Renewal','Status',''],rows);
  }
  if(tab==='nonrenewal'){
    const exp=active.filter(p=>{const rd=parseDate(p.renewalDate);return rd&&rd<SYS_DATE&&p.lockers.length>0});
    return mets([['Non-renewals',exp.length,'#e24b4a'],['Lockers to release',exp.reduce((s,p)=>s+p.lockers.length,0),'#ba7517']])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Non-renewals</div>`+tbl(['Name','Lockers','Expired','Days overdue','Status'],exp.map(p=>{const rd=parseDate(p.renewalDate);return`<tr><td>${p.first} ${p.last}</td><td>${p.lockers.map(n=>'#'+n).join(', ')}</td><td>${fmtDate(p.renewalDate)}</td><td>${rd?daysBetween(rd,SYS_DATE)+'d':'—'}</td><td><span class="badge badge-inactive">Non-renewal given</span></td></tr>`}),'No non-renewals.');
  }
  if(tab==='bars'){
    const allB=ps.flatMap(p=>(p.bars||[]).map(b=>({...b,name:p.first+' '+p.last})));const actB=allB.filter(b=>b.permanent||(parseDate(b.endDate)>=SYS_DATE&&!b.expired));const histB=allB.filter(b=>!b.permanent&&(b.expired||parseDate(b.endDate)<SYS_DATE));const thisMoB=allB.filter(b=>inMo(b.startDate));
    return mets([['Active',actB.length,'#e24b4a'],['Permanent',actB.filter(b=>b.permanent).length,'#a32d2d'],['This month',thisMoB.length],['Historical',allB.length]])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Active bars</div>`+tbl(['Name','Type','Reason','Issued by','Issued','Until'],actB.map(b=>`<tr><td>${b.name}</td><td><span class="badge ${b.permanent?'badge-inactive':'badge-barred'}">${b.permanent?'Permanent':'Temp'}</span></td><td>${b.reason}</td><td style="font-size:11px">${b.issuedBy||'EC'}</td><td>${fmtDate(b.startDate)}</td><td>${b.permanent?'Forever':fmtDate(b.endDate)}</td></tr>`),'No active bars.')+`<div style="font-size:13px;font-weight:500;margin:16px 0 8px">History</div>`+tbl(['Name','Reason','Issued by','Period'],histB.map(b=>`<tr><td>${b.name}</td><td>${b.reason}</td><td style="font-size:11px">${b.issuedBy||'EC'}</td><td>${fmtDate(b.startDate)} – ${fmtDate(b.endDate)}</td></tr>`),'None.');
  }
  if(tab==='participants'){
    const a=active.filter(p=>p.status==='active');const i=active.filter(p=>p.status==='inactive');const b=active.filter(p=>p.status==='barred');const past=ps.filter(p=>p.isPast);
    const r=p=>`<tr><td>${p.first} ${p.last}</td><td><span class="badge badge-${p.status}">${p.status}</span></td><td>${p.lockers.map(n=>'#'+n).join(', ')||'—'}</td><td>${fmtDate(p.renewalDate)}</td><td style="font-size:11px;color:#888">${p.statusReason||'—'}</td></tr>`;
    return mets([['Active',a.length,'#3b6d11'],['Inactive',i.length,'#e24b4a'],['Barred',b.length,'#ba7517'],['Past',past.length]])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Active (${a.length})</div>`+tbl(['Name','Status','Lockers','Renewal','Reason'],a.map(r),'None.')+`<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Inactive (${i.length})</div>`+tbl(['Name','Status','Lockers','Renewal','Reason'],i.map(r),'None.')+`<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Barred (${b.length})</div>`+tbl(['Name','Status','Lockers','Renewal','Reason'],b.map(r),'None.')+`<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Past (${past.length})</div>`+tbl(['Name','Past since','Reason'],past.map(p=>`<tr><td>${p.first} ${p.last}</td><td>${fmtDate(p.pastSince||'')}</td><td>${p.pastReason||'—'}</td></tr>`),'None.');
  }
  if(tab==='lockers'){
    const av=S.lockers.filter(l=>l.status==='available');const ac=S.lockers.filter(l=>l.status==='active');const br=S.lockers.filter(l=>!l.working);
    return mets([['Total',S.lockers.length],['Active',ac.length,'#185fa5'],['Available',av.length,'#3b6d11'],['Broken',br.length,'#e24b4a']])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Assigned lockers</div>`+tbl(['#','Participant','Renewal','Shifts met','Status'],ac.map(l=>{const p=S.participants.find(x=>x.id===l.assignedTo);const met=p?(()=>{const assigned=(p.assignedWorkDates||[]).filter(d=>inMo(d));const ci=att.filter(a=>a.participantId===p.id&&a.type==='work'&&inMo(a.recordedDate||a.date)).map(a=>a.recordedDate||a.date);return assigned.filter(d=>ci.includes(d)).length})():0;return`<tr><td>#${l.number}</td><td>${p?p.first+' '+p.last:'—'}</td><td>${p?fmtDate(p.renewalDate):'—'}</td><td style="color:${p&&met>=p.lockers.length?'#3b6d11':'#e24b4a'}">${met}${p?'/'+p.lockers.length:''}</td><td><span class="badge badge-active">Active</span></td></tr>`}),'No active lockers.')+(br.length?`<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Broken (${br.length})</div>`+tbl(['#','Problem','Assigned to'],br.map(l=>{const p=l.assignedTo?S.participants.find(x=>x.id===l.assignedTo):null;return`<tr><td>#${l.number}</td><td>${l.problem||'?'}</td><td>${p?p.first+' '+p.last:'Unassigned'}</td></tr>`})):'');
  }
  if(tab==='credits'){
    const total=ps.reduce((s,p)=>s+(p.credits||0),0);
    const rows=active.map(p=>{const earned=(p.creditLog||[]).filter(c=>c.adj>0).reduce((s,c)=>s+c.adj,0);const used=(p.creditLog||[]).filter(c=>c.adj<0).reduce((s,c)=>s+Math.abs(c.adj),0);return`<tr><td>${p.first} ${p.last}</td><td>${p.lockers.length}</td><td style="color:#3b6d11">+${earned}</td><td style="color:#e24b4a">-${used}</td><td style="font-weight:500">${p.credits||0}</td><td style="font-size:11px">${(p.creditLog||[]).slice(-2).map(c=>`${c.adj>0?'+':''}${c.adj} by ${c.by||'?'} (${fmtDate(c.date)}): ${c.reason||''}`).join('; ')||'—'}</td></tr>`});
    return mets([['Total in system',total],['Avg/participant',active.length?Math.round(total/active.length):0],['With credits',active.filter(p=>p.credits>0).length]])+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Credit balances & adjustment history</div>`+tbl(['Name','Lockers','Earned','Used','Balance','Recent adjustments'],rows);
  }
  if(tab==='misses'){
    const ago30=new Date(SYS_DATE);ago30.setDate(ago30.getDate()-30);
    const wkMiss=active.filter(p=>{if(!p.lockers.length)return false;const assigned=(p.assignedWorkDates||[]).filter(d=>inMo(d));const ci=att.filter(a=>a.participantId===p.id&&a.type==='work'&&inMo(a.recordedDate||a.date)).map(a=>a.recordedDate||a.date);const met=assigned.filter(d=>ci.includes(d)).length;return p.lockers.length-met-Math.min(p.credits||0,p.lockers.length-met)>0});
    const mtgMiss=active.filter(p=>!att.some(a=>{if(a.participantId!==p.id||a.type!=='meeting')return false;const d=parseDate(a.recordedDate||a.date);return d&&d>=ago30}));
    const plMiss=active.filter(p=>!att.some(a=>{if(a.participantId!==p.id||a.type!=='power-lunch')return false;const d=parseDate(a.recordedDate||a.date);return d&&d.getFullYear()===yr}));
    const warns=active.filter(p=>(p.missedDateWarnings||[]).some(w=>!w.resolved));
    return mets([['Work misses',wkMiss.length,'#e24b4a'],['Meeting misses (30d)',mtgMiss.length,'#ba7517'],['PL misses ('+yr+')',plMiss.length,'#854f0b'],['Open warnings',warns.length,'#e24b4a']])+
    `<div style="font-size:13px;font-weight:500;margin-bottom:8px">Work shift misses — ${monthLabel(mk)}</div>`+tbl(['Name','Lockers','Assigned','Met','Credits','Shortfall'],wkMiss.map(p=>{const assigned=(p.assignedWorkDates||[]).filter(d=>inMo(d));const ci=att.filter(a=>a.participantId===p.id&&a.type==='work'&&inMo(a.recordedDate||a.date)).map(a=>a.recordedDate||a.date);const met=assigned.filter(d=>ci.includes(d)).length;const def=p.lockers.length-met;const cov=Math.min(p.credits||0,def>0?def:0);return`<tr><td>${p.first} ${p.last}</td><td>${p.lockers.map(n=>'#'+n).join(', ')}</td><td>${assigned.map(fmtDate).join(', ')||'—'}</td><td>${met}/${p.lockers.length}</td><td>${p.credits||0}</td><td style="color:#e24b4a;font-weight:500">${def-cov} short</td></tr>`}),'No work shift misses.')+
    `<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Meeting misses (no attendance in last 30 days)</div>`+tbl(['Name','Last meeting','Days since'],mtgMiss.map(p=>{const r=att.filter(a=>a.participantId===p.id&&a.type==='meeting');r.sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date));const l=r.length?parseDate(r[0].recordedDate||r[0].date):null;return`<tr><td>${p.first} ${p.last}</td><td>${l?fmtDate(l):'Never'}</td><td style="color:#e24b4a">${l?daysBetween(l,SYS_DATE)+'d':'—'}</td></tr>`}),'All have recent meeting.')+
    `<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Power Lunch misses — ${yr}</div>`+tbl(['Name','Status'],plMiss.map(p=>`<tr><td>${p.first} ${p.last}</td><td><span class="badge badge-inactive">Missing ${yr}</span></td></tr>`),'All attended.')+
    (warns.length?`<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Open missed-date warnings</div>`+tbl(['Name','Missed','Deadline','Days left'],warns.map(p=>{const w=p.missedDateWarnings.find(x=>!x.resolved);const dl=parseDate(w.deadline);return`<tr><td>${p.first} ${p.last}</td><td>${fmtDate(w.missedDate)}</td><td>${fmtDate(w.deadline)}</td><td style="color:${dl&&daysBetween(SYS_DATE,dl)<=3?'#e24b4a':'#ba7517'}">${dl?daysBetween(SYS_DATE,dl)+'d':'—'}</td></tr>`})):'');
  }
  if(tab==='audit'){
    const logs=(S.auditLog||[]).slice().reverse().slice(0,200);
    const pFilter=document.getElementById('rpt-p-filter')?.value||'';
    const filtered=pFilter?logs.filter(l=>l.participantId===pFilter):logs;
    const pSelect=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px" class="no-print"><label style="font-size:12px;color:#666">Filter by participant:</label><select style="width:200px" id="rpt-p-filter" onchange="render()"><option value="">All participants</option>${ps.map(p=>`<option value="${p.id}" ${pFilter===p.id?'selected':''}>${p.first} ${p.last}</option>`).join('')}</select></div>`;
    return pSelect+`<div style="font-size:13px;font-weight:500;margin-bottom:8px">Audit log (last 200 entries)</div>`+
    `<div class="card" style="padding:0">${filtered.length?`<div style="max-height:600px;overflow-y:auto">${filtered.map(l=>{const p=ps.find(x=>x.id===l.participantId);return`<div class="audit-row"><span class="audit-who">${l.ecName||'System'}</span><span class="audit-when">${fmtDate(l.date)} ${l.time||''}</span><span class="audit-what">${l.action}: ${l.detail||''}${p?' → '+p.first+' '+p.last:''}</span></div>`}).join('')}</div>`:'<p style="color:#888;font-size:13px;padding:16px">No audit records.</p>'}</div>`;
  }
  if(tab==='credit-rollover'){
    // Show all auto-applied credit entries
    const rolloverEntries = [];
    ps.forEach(p => {
      (p.creditLog||[]).filter(c=>c.autoApply).forEach(c => {
        rolloverEntries.push({name:p.first+' '+p.last, ...c});
      });
    });
    rolloverEntries.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const monthFilter = rolloverEntries.filter(r=>r.month===mk);
    return mets([['Auto-applied this period', monthFilter.length], ['Total credits auto-applied', rolloverEntries.length]])+
    `<div style="font-size:13px;font-weight:500;margin-bottom:8px">Credit rollover entries — ${monthLabel(mk)}</div>`+
    tbl(['Participant','Credits used','Reason','Month covered','Date applied','Balance after'],
      monthFilter.map(r=>`<tr><td>${r.name}</td><td style="color:#e24b4a;font-weight:500">${r.adj}</td><td>${r.reason||'—'}</td><td>${r.month?monthLabel(r.month):'—'}</td><td>${fmtDate(r.date)}</td><td>${r.balance}</td></tr>`),
      'No credit rollover entries for this period.')+
    `<div style="font-size:13px;font-weight:500;margin:16px 0 8px">All credit rollover history</div>`+
    tbl(['Participant','Credits used','Month covered','Date applied','Balance'],
      rolloverEntries.map(r=>`<tr><td>${r.name}</td><td style="color:#e24b4a">${r.adj}</td><td>${r.month?monthLabel(r.month):'—'}</td><td>${fmtDate(r.date)}</td><td>${r.balance}</td></tr>`),
      'No rollover history.');
  }
  if(tab==='motions'){
    const notes = S.meetingNotes || [];
    const allMotions = [];
    notes.forEach(n => {
      (n.motions||[]).forEach(m => {
        allMotions.push({...m, meetingDate:n.meetingDate, meetingType:n.meetingType, submittedBy:n.submittedBy});
      });
    });
    const passed = allMotions.filter(m=>m.inFavor > m.against);
    const failed = allMotions.filter(m=>m.inFavor <= m.against);
    return mets([['Total motions',allMotions.length],['Passed',passed.length,'#3b6d11'],['Failed',failed.length,'#e24b4a']])+
    `<div style="font-size:13px;font-weight:500;margin-bottom:8px">Passed motions</div>`+
    tbl(['Motion','Meeting','Date','In favor','Against','Abstain','Result'],
      passed.map(m=>`<tr><td style="font-weight:500">${m.text}</td><td>${m.meetingType==='power-lunch'?'Power Lunch':'Sunday Meeting'}</td><td>${fmtDate(m.meetingDate)}</td><td style="color:#3b6d11">${m.inFavor}</td><td style="color:#e24b4a">${m.against}</td><td style="color:#888">${m.abstain}</td><td><span class="badge badge-active">PASSED</span></td></tr>`),
      'No motions have passed yet.')+
    (failed.length ? `<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Failed motions</div>`+
    tbl(['Motion','Meeting','Date','In favor','Against'],
      failed.map(m=>`<tr><td>${m.text}</td><td>${m.meetingType==='power-lunch'?'Power Lunch':'Sunday Meeting'}</td><td>${fmtDate(m.meetingDate)}</td><td>${m.inFavor}</td><td>${m.against}</td></tr>`)) : '');
  }
  return '<p style="color:#888;padding:20px">Select a report tab.</p>';
}


// ── MONTH-END CREDIT AUTO-APPLY ────────────────────────────────────────────
function runMonthEndCreditApply(){
  const today=SYS_DATE;if(!S._creditApplyDone)S._creditApplyDone={};
  const key='creditApplied_'+monthKey(today);if(S._creditApplyDone[key])return;
  const prevDate=new Date(today.getFullYear(),today.getMonth()-1,1);const prevMk=monthKey(prevDate);
  const[prevYr,prevMo]=prevMk.split('-').map(Number);const notifications=[];
  (S.participants||[]).filter(p=>!p.isPast&&p.lockers.length>0).forEach(p=>{
    const assigned=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&pd.getFullYear()===prevYr&&(pd.getMonth()+1)===prevMo});
    const checkedIn=(S.attendance||[]).filter(a=>{if(a.participantId!==p.id||a.type!=='work')return false;const d=parseDate(a.recordedDate||a.date);return d&&d.getFullYear()===prevYr&&(d.getMonth()+1)===prevMo}).map(a=>a.recordedDate||a.date);
    const met=assigned.filter(d=>checkedIn.includes(d)).length;const deficit=p.lockers.length-met;
    if(deficit>0&&(p.credits||0)>0){const use=Math.min(deficit,p.credits);p.credits-=use;
      if(!p.creditLog)p.creditLog=[];
      p.creditLog.push({date:todayStr(),adj:-use,by:'System (month-end)',reason:'Auto: '+use+' missed shift(s) in '+monthLabel(prevMk),balance:p.credits,autoApply:true,month:prevMk});
      notifications.push({name:p.first+' '+p.last,used:use,remaining:p.credits,month:prevMk});
      audit('CREDIT_AUTO_APPLY',p.id,'Month-end: -'+use+' for '+monthLabel(prevMk)+', bal='+p.credits);}
  });
  S._creditApplyDone[key]={ran:todayStr(),notifications};
  if(!S._adminNotifications)S._adminNotifications=[];
  if(notifications.length>0)S._adminNotifications.push({id:'n'+Date.now(),date:todayStr(),type:'credit-rollover',month:prevMk,notifications,read:false,message:notifications.length+' participant(s) had credits auto-applied for '+monthLabel(prevMk)});
  save();
}

function pgMeetingNotes(){
  const notes=(S.meetingNotes||[]).slice().reverse();
  return `<div class="tab-bar"><div class="tab active" id="mn-t1" onclick="mnTab('all')">All notes</div><div class="tab" id="mn-t2" onclick="mnTab('motions')">Motions passed</div></div>
  <div id="mn-all">${notes.length?notes.map(n=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="flex:1"><div style="font-size:14px;font-weight:500">${n.meetingType==='power-lunch'?'Power Lunch':'Sunday Meeting'} — ${fmtDate(n.meetingDate)}</div><div style="font-size:12px;color:#888">By ${n.submittedBy} on ${fmtDate(n.submittedOn)}</div></div><span class="badge badge-${n.meetingType==='power-lunch'?'barred':'pending'}">${n.meetingType==='power-lunch'?'Power Lunch':'Sunday Meeting'}</span></div>
      ${n.notes?`<div style="font-size:13px;color:#555;white-space:pre-wrap;margin-bottom:8px">${n.notes}</div>`:''}

    </div>`).join(''):'<div class="card"><p style="color:#888;font-size:13px">No meeting notes yet. Use "Submit notes" to add the first entry.</p></div>'}

function buildMotionsReport(notes){
  const passed=[];(notes||[]).forEach(n=>{(n.motions||[]).forEach(m=>{if(m.inFavor>m.against)passed.push({...m,meetingDate:n.meetingDate,meetingType:n.meetingType})})});

}
function mnTab(t){['all','motions'].forEach(x=>{const el=document.getElementById('mn-'+x);if(el)el.style.display=x===t?'block':'none';const tb=document.getElementById('mn-t'+(x==='all'?1:2));if(tb)tb.className='tab'+(x===t?' active':'')})}
let _mIdx=0;
function mSubmitMeetingNotes(){
  _mIdx=0;
  return `<div class="modal-title"><i class="ti ti-notes"></i> Submit meeting notes</div>
  <div class="form-row"><div class="form-group"><label class="form-label">Meeting date</label><input type="date" id="mn-date" value="${todayStr()}"></div><div class="form-group"><label class="form-label">Meeting type</label><select id="mn-type"><option value="sunday">Sunday Meeting</option><option value="power-lunch">Power Lunch</option></select></div></div>

function addMotionField(){
  _mIdx++;const i=_mIdx;const list=document.getElementById('mn-motions-list');if(!list)return;
  const div=document.createElement('div');div.id='mf-'+i;div.style.cssText='background:#f5f5f3;border-radius:8px;padding:12px;margin-bottom:8px';
  div.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:12px;font-weight:500;flex:1">Motion #${i}</span><button class="btn btn-sm btn-danger" onclick="document.getElementById('mf-${i}').remove()">Remove</button></div>

    <div class="form-group"><label class="form-label">In favor</label><input type="number" id="mfi-${i}" value="0" min="0" oninput="showResult(${i})"></div>
    <div class="form-group"><label class="form-label">Against</label><input type="number" id="mag-${i}" value="0" min="0" oninput="showResult(${i})"></div>
    <div class="form-group"><label class="form-label">Abstain</label><input type="number" id="mab-${i}" value="0" min="0"></div>
  </div>
  <div id="mres-${i}" style="font-size:12px;color:#888">Enter votes to see result</div>`;
  list.appendChild(div);
}
function showResult(i){const inf=parseInt(document.getElementById('mfi-'+i)?.value||0)||0;const ag=parseInt(document.getElementById('mag-'+i)?.value||0)||0;const el=document.getElementById('mres-'+i);if(el)el.innerHTML=inf>ag?`<span style="color:#3b6d11;font-weight:500">Will PASS (${inf} vs ${ag})</span>`:ag>inf?`<span style="color:#e24b4a;font-weight:500">Will FAIL (${inf} vs ${ag})</span>`:'<span style="color:#888">Tie — fails</span>'}
function doSubmitMeetingNotes(){
  const date=(document.getElementById('mn-date')||{value:todayStr()}).value||todayStr();
  const type=(document.getElementById('mn-type')||{value:'sunday'}).value;
  const by=(document.getElementById('mn-by')||{value:''}).value||S.currentUser?.name||'Unknown';
  const notes=(document.getElementById('mn-notes')||{value:''}).value.trim();
  const motions=[];
  for(let i=1;i<=_mIdx;i++){
    const el=document.getElementById('mf-'+i);if(!el||!document.body.contains(el))continue;
    const text=(document.getElementById('mt-'+i)||{value:''}).value.trim();if(!text)continue;
    const inf=parseInt(document.getElementById('mfi-'+i)?.value||0)||0;
    const ag=parseInt(document.getElementById('mag-'+i)?.value||0)||0;
    const ab=parseInt(document.getElementById('mab-'+i)?.value||0)||0;
    motions.push({text,inFavor:inf,against:ag,abstain:ab});
  }
  if(!S.meetingNotes)S.meetingNotes=[];
  S.meetingNotes.push({id:'mn'+Date.now(),meetingDate:date,meetingType:type,submittedBy:by,submittedOn:todayStr(),notes,motions});
  const passed=motions.filter(m=>m.inFavor>m.against).length;
  audit('MEETING_NOTES','','Notes: '+(type==='power-lunch'?'PL':'Sunday')+' '+fmtDate(date)+(passed?' ('+passed+' passed)':''));
  _mIdx=0;save();closeModal();S.page='meeting-notes';render();
  toast('Notes submitted'+(passed?' — '+passed+' motion(s) passed':'')+'!');
}
