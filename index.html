<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LockerLink</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#fff;border-right:.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:16px;border-bottom:.5px solid rgba(0,0,0,.12)}
.sidebar-logo h1{font-size:15px;font-weight:500}
.sidebar-logo p{font-size:11px;color:#888;margin-top:2px}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;color:#666;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:#f5f5f3;color:#1a1a1a}
.nav-item.active{background:#e6f1fb;color:#185fa5;border-left-color:#378add;font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.sidebar-user{padding:12px 16px;border-top:.5px solid rgba(0,0,0,.12);display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#185fa5;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:.5px solid rgba(0,0,0,.12);padding:12px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.topbar h2{font-size:16px;font-weight:500;flex:1;min-width:100px}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:.5px solid rgba(0,0,0,.25);border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#378add;color:#fff;border-color:#378add}
.btn-primary:hover{background:#185fa5}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.btn-warning{background:#faeeda;color:#854f0b;border-color:#fac775}
.btn-success{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.btn-sm{padding:4px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-active{background:#eaf3de;color:#3b6d11}
.badge-inactive{background:#fcebeb;color:#a32d2d}
.badge-barred{background:#faeeda;color:#854f0b}
.badge-pending{background:#e6f1fb;color:#185fa5}
.badge-past{background:#f5f5f3;color:#666}
.badge-admin{background:#e6f1fb;color:#185fa5}
.card{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;padding:16px}
.card+.card{margin-top:12px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric{background:#f5f5f3;border-radius:8px;padding:12px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
input[type=text],input[type=email],input[type=password],input[type=date],input[type=number],select,textarea{width:100%;padding:7px 10px;border:.5px solid rgba(0,0,0,.25);border-radius:8px;font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px #378add40}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:#666;margin-bottom:4px;display:block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:#888;border-bottom:.5px solid rgba(0,0,0,.12);white-space:nowrap}
td{padding:8px 10px;border-bottom:.5px solid rgba(0,0,0,.08);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f5f3}
.search-bar{position:relative;flex:1}
.search-bar input{padding-left:34px}
.search-bar i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:16px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;background:#f5f5f3;color:#666;margin:2px}
.pill-locker{display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;background:#e6f1fb;color:#185fa5;font-size:11px;margin:2px;font-weight:500}
.locker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px}
.locker-cell{height:52px;border-radius:8px;border:.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:transform .1s;font-weight:500;text-align:center;padding:2px}
.locker-cell:hover{transform:scale(1.05)}
.lc-available{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.lc-active{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4}
.lc-barred{background:#faeeda;color:#854f0b;border-color:#fac775}
.lc-broken{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.lc-inactive{background:#f5f5f3;color:#aaa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:24px;width:580px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.alert-warning{background:#faeeda;color:#854f0b;border:.5px solid #fac775}
.alert-danger{background:#fcebeb;color:#a32d2d;border:.5px solid #f7c1c1}
.alert-success{background:#eaf3de;color:#3b6d11;border:.5px solid #c0dd97}
.alert-info{background:#e6f1fb;color:#185fa5;border:.5px solid #b5d4f4}
.divider{border-bottom:.5px solid rgba(0,0,0,.08);margin:14px 0}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:.5px solid rgba(0,0,0,.12);flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap}
.tab.active{color:#378add;border-bottom-color:#378add;font-weight:500}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dot-active{background:#639922}.dot-inactive{background:#e24b4a}.dot-barred{background:#ba7517}.dot-past{background:#aaa}
.chat-area{display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding:10px;background:#f5f5f3;border-radius:8px}
.chat-msg{max-width:80%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-from-ec{background:#378add;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-from-p{background:#fff;align-self:flex-start;border-bottom-left-radius:4px;border:.5px solid rgba(0,0,0,.12)}
.chat-meta{font-size:10px;opacity:.7;margin-top:2px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px}
.toast.show{opacity:1}
.ci-entry{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;background:#f5f5f3;font-size:12px;margin-bottom:4px}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#e24b4a;color:#fff;font-size:10px;margin-left:auto;padding:0 4px}
.rpt-ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:10px;padding:12px 16px}
.audit-row{font-size:12px;padding:6px 8px;border-bottom:.5px solid rgba(0,0,0,.07);display:flex;gap:8px;align-items:flex-start}
.audit-row:last-child{border-bottom:none}
.audit-who{color:#378add;font-weight:500;white-space:nowrap;min-width:80px}
.audit-when{color:#aaa;white-space:nowrap;min-width:80px}
.audit-what{flex:1;color:#555}
@media print{.sidebar,.topbar,.rpt-ctrl,.btn,.no-print{display:none!important}.content{padding:0}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sidebar-logo">
    <h1><i class="ti ti-lock" style="font-size:14px;color:#378add"></i> LockerLink</h1>
    <p>Community Resource Manager</p>
  </div>
  <div class="sidebar-nav" id="nav"></div>
  <div class="sidebar-user" id="user-bar"></div>
</div>
<div class="main">
  <div class="topbar"><h2 id="page-title">Dashboard</h2><div id="topbar-actions" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
  <div class="content" id="content"></div>
</div>
</div>
<script>
// ── SYSTEM DATE (single source of truth for all time logic) ────────────────
const SYS_DATE = new Date('2025-08-08'); // Change this to go-live date
const todayStr = () => SYS_DATE.toISOString().split('T')[0];

// ── DATE HELPERS ───────────────────────────────────────────────────────────
function fmtDate(d){if(!d||d==='9/9/9999')return'—';try{const dt=new Date(d);if(isNaN(dt))return String(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return String(d)}}
function parseDate(s){if(!s||s==='9/9/9999')return null;const d=new Date(s);return isNaN(d)?null:d}
function daysBetween(a,b){return Math.round((b-a)/(1000*60*60*24))}
function monthKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)}
function monthLabel(mk){const[y,m]=mk.split('-');return new Date(+y,+m-1,1).toLocaleString('en-US',{month:'long',year:'numeric'})}
function addDays(base,n){const d=new Date(base);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function ciColor(t){return{work:'#639922',meeting:'#185fa5','power-lunch':'#854f0b','locker-checkin':'#888'}[t]||'#888'}
function toast(msg,dur){let t=document.getElementById('_t');if(!t){t=document.createElement('div');t.id='_t';t.className='toast';document.body.appendChild(t)}t.textContent=msg;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),dur||3200)}

// ── SEED DATA ──────────────────────────────────────────────────────────────
const SEED_P=[
  {id:'p1',first:'Jack',last:'Black',email:'jack@example.com',pin:'1234',role:'participant',
   lockers:[18,38],barredLockers:[26],credits:4,renewalDate:'2025-08-25',firstDate:'2021-06-15',
   assignedWorkDates:['2025-08-25','2025-08-26'],
   bars:[],status:'active',statusReason:'',notes:'',missedDateWarnings:[],creditLog:[],isPast:false},
  {id:'p2',first:'Horace',last:'Mann',email:'horace@example.com',pin:'2345',role:'participant',
   lockers:[27,54,5],barredLockers:[],credits:3,renewalDate:'2025-08-25',firstDate:'2024-03-07',
   assignedWorkDates:[],bars:[],status:'inactive',statusReason:'',notes:'',missedDateWarnings:[],creditLog:[],isPast:false},
  {id:'p3',first:'Jane',last:'Austin',email:'jane@example.com',pin:'3456',role:'participant',
   lockers:[152,3],barredLockers:[],credits:5,renewalDate:'2025-08-11',firstDate:'2018-02-07',
   assignedWorkDates:[],bars:[],status:'inactive',statusReason:'',notes:'',missedDateWarnings:[],creditLog:[],isPast:false},
  {id:'p4',first:'Steven',last:'Socks',email:'steven@example.com',pin:'4567',role:'participant',
   lockers:[9,2],barredLockers:[],credits:5,renewalDate:'2025-08-05',firstDate:'2025-07-01',
   assignedWorkDates:['2025-08-31'],bars:[],status:'active',statusReason:'',notes:'',missedDateWarnings:[],creditLog:[],isPast:false},
  {id:'p5',first:'Mary',last:'Jane',email:'mary@example.com',pin:'5678',role:'participant',
   lockers:[1,26],barredLockers:[],credits:5,renewalDate:'2025-08-02',firstDate:'2025-07-05',
   assignedWorkDates:['2025-08-29','2025-08-30'],bars:[],status:'active',statusReason:'',notes:'',missedDateWarnings:[],creditLog:[],isPast:false},
  {id:'p6',first:'Simon',last:'Stewart',email:'simon@example.com',pin:'6789',role:'participant',
   lockers:[25],barredLockers:[],credits:5,renewalDate:'2025-07-06',firstDate:'2025-01-10',
   assignedWorkDates:[],bars:[],status:'inactive',statusReason:'',notes:'',missedDateWarnings:[],creditLog:[],isPast:false},
];
const SEED_ATT=[
  {id:'sa1',participantId:'p1',type:'meeting',date:'2025-07-25',recordedDate:'2025-07-25',time:'10:00 AM'},
  {id:'sa2',participantId:'p2',type:'meeting',date:'2025-07-25',recordedDate:'2025-07-25',time:'10:00 AM'},
  {id:'sa3',participantId:'p3',type:'meeting',date:'2025-07-25',recordedDate:'2025-07-25',time:'10:00 AM'},
  {id:'sa4',participantId:'p4',type:'meeting',date:'2025-07-25',recordedDate:'2025-07-25',time:'10:00 AM'},
  {id:'sa5',participantId:'p5',type:'meeting',date:'2025-07-25',recordedDate:'2025-07-25',time:'10:00 AM'},
  {id:'sa6',participantId:'p1',type:'power-lunch',date:'2025-03-01',recordedDate:'2025-03-01',time:'12:00 PM'},
  {id:'sa7',participantId:'p2',type:'power-lunch',date:'2025-06-10',recordedDate:'2025-06-10',time:'12:00 PM'},
  {id:'sa8',participantId:'p3',type:'power-lunch',date:'2025-06-15',recordedDate:'2025-06-15',time:'12:00 PM'},
  {id:'sa9',participantId:'p5',type:'power-lunch',date:'2025-03-01',recordedDate:'2025-03-01',time:'12:00 PM'},
  {id:'sa10',participantId:'p1',type:'work',date:'2025-08-25',recordedDate:'2025-08-25',time:'09:00 AM'},
  {id:'sa11',participantId:'p1',type:'work',date:'2025-08-26',recordedDate:'2025-08-26',time:'09:00 AM'},
  {id:'sa12',participantId:'p4',type:'work',date:'2025-08-31',recordedDate:'2025-08-31',time:'09:00 AM'},
  {id:'sa13',participantId:'p5',type:'work',date:'2025-08-29',recordedDate:'2025-08-29',time:'09:00 AM'},
  {id:'sa14',participantId:'p5',type:'work',date:'2025-08-30',recordedDate:'2025-08-30',time:'09:00 AM'},
];
const SEED_LK=Array.from({length:400},(_,i)=>{const n=i+1;const p=SEED_P.find(x=>x.lockers.includes(n)||x.barredLockers.includes(n));const brk=n===14;return{number:n,working:!brk,problem:brk?'broken latch':'',assignedTo:p?p.id:null,status:p?(p.barredLockers.includes(n)?'barred':'active'):(brk?'broken':'available')}});
const SEED_U=[
  {id:'ec1',role:'ec',name:'Admin EC',email:'ec@lockerlink.org',password:'admin123'},
  {id:'clerk1',role:'clerk',name:'Admin Clerk',email:'clerk@lockerlink.org',password:'clerk123'},
  {id:'ec2',role:'ec',name:'Sarah Chen',email:'sarah@lockerlink.org',password:'ec456'},
];

// ── STATE ──────────────────────────────────────────────────────────────────
let S={
  participants:[],lockers:[],users:[],attendance:[],messages:[],auditLog:[],
  currentUser:null,page:'dashboard',_activeThread:null,_heldLockers:[],
  _reportMonth:'',_reportTab:'work',_barRecoTab:'active',
};

function loadState(){
  try{const r=localStorage.getItem('ll4');if(r){Object.assign(S,JSON.parse(r));return}}catch(e){console.warn(e)}
  S.participants=JSON.parse(JSON.stringify(SEED_P));
  S.lockers=JSON.parse(JSON.stringify(SEED_LK));
  S.users=JSON.parse(JSON.stringify(SEED_U));
  S.attendance=JSON.parse(JSON.stringify(SEED_ATT));
  S.messages=[];S.auditLog=[];S._reportMonth=monthKey(SYS_DATE);
}
function save(){try{localStorage.setItem('ll4',JSON.stringify(S))}catch(e){console.warn(e)}}

// ── AUDIT LOGGING ──────────────────────────────────────────────────────────
function audit(action,participantId,detail){
  if(!S.auditLog)S.auditLog=[];
  S.auditLog.push({id:'al'+Date.now()+Math.random().toString(36).slice(2),
    ecId:S.currentUser?.id||'system',ecName:S.currentUser?.name||'System',
    action,participantId,detail,date:todayStr(),
    time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})});
}

// ── STATUS ENGINE (driven by SYS_DATE) ────────────────────────────────────
function calcStatus(p){
  if(p.isPast){p.status='past';p.statusReason='Past participant';return}
  const today=SYS_DATE,cm=monthKey(today),att=S.attendance||[];
  // 1. Active bar
  const activeBars=(p.bars||[]).filter(b=>{
    if(b.permanent)return true;
    const end=parseDate(b.endDate);return end&&end>=today&&!b.expired;
  });
  if(activeBars.length){p.status='barred';p.statusReason='Bar: '+activeBars[0].reason+(activeBars[0].permanent?' (permanent)':' until '+fmtDate(activeBars[0].endDate));return}
  // Auto-expire bars after 30 days — check and move to past if permanent+expired (handled separately)
  const reasons=[];
  // 2. Renewal: locker goes inactive if past the 16th of the month after renewal month
  const rd=parseDate(p.renewalDate);
  if(rd&&p.lockers.length>0){
    const expDate=new Date(rd.getFullYear(),rd.getMonth()+1,16);
    if(today>=expDate)reasons.push('Non-renewal — locker inactive (non-renewal given)');
  }
  // 3. Work shifts: assigned dates must have matching check-in records
  const numL=p.lockers.length;
  if(numL>0){
    const assignedThisMonth=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});
    const checkedIn=att.filter(a=>{
      if(a.participantId!==p.id||a.type!=='work')return false;
      const d=parseDate(a.recordedDate||a.date);return d&&monthKey(d)===cm;
    }).map(a=>a.recordedDate||a.date);
    // A work date is "met" if the participant checked in on that assigned date
    const metDates=assignedThisMonth.filter(d=>checkedIn.includes(d));
    const missed=assignedThisMonth.filter(d=>!checkedIn.includes(d)&&parseDate(d)<today);
    const deficit=numL-metDates.length;
    const creditCover=Math.min(p.credits||0,deficit>0?deficit:0);
    const net=deficit-creditCover;
    // Active warnings
    const warn=(p.missedDateWarnings||[]).find(w=>!w.resolved&&parseDate(w.deadline)>=today);
    if(missed.length>0&&warn){
      reasons.push('Missed shift(s) on '+missed.map(fmtDate).join(', ')+' — replacement required by '+fmtDate(warn.deadline));
    } else if(net>0){
      reasons.push('Missing '+net+' work shift(s) for '+today.toLocaleString('en-US',{month:'long'}));
    }
    // Auto-bar check: if warning deadline passed
    const expiredWarns=(p.missedDateWarnings||[]).filter(w=>!w.resolved&&parseDate(w.deadline)<today);
    expiredWarns.forEach(w=>{
      w.resolved=true;w.autoBarred=true;
      if(!p.bars)p.bars=[];
      const endDate=addDays(todayStr(),30);
      p.bars.push({id:'ab'+Date.now(),startDate:todayStr(),endDate,permanent:false,reason:'Missed work date replacement not selected within 14 days',auto:true});
      audit('AUTO_BAR',p.id,'Auto-bar applied: missed date deadline expired');
    });
  }
  // 4. Meeting: rolling 30-day window
  const ago30=new Date(today);ago30.setDate(ago30.getDate()-30);
  const hasMtg=att.some(a=>{if(a.participantId!==p.id||a.type!=='meeting')return false;const d=parseDate(a.recordedDate||a.date);return d&&d>=ago30&&d<=today});
  p.meetingStatus=hasMtg;if(!hasMtg)reasons.push('No meeting attended in the last 30 days');
  // 5. Power lunch: once per calendar year
  const yr=today.getFullYear();
  const hasPL=att.some(a=>{if(a.participantId!==p.id||a.type!=='power-lunch')return false;const d=parseDate(a.recordedDate||a.date);return d&&d.getFullYear()===yr});
  p.plStatus=hasPL;if(!hasPL)reasons.push('Missing power lunch for '+yr);
  p.status=reasons.length?'inactive':'active';p.statusReason=reasons.join('; ');
}

function refreshAll(){
  // First expire bars whose 30-day window is up — move participant to past if permanent+expired
  const today=SYS_DATE;
  S.participants.forEach(p=>{
    if(p.isPast)return;
    (p.bars||[]).forEach(b=>{
      if(!b.permanent&&!b.expired&&parseDate(b.endDate)<today){b.expired=true;audit('BAR_EXPIRED',p.id,'30-day bar expired: '+b.reason)}
    });
  });
  S.participants.forEach(calcStatus);
}


// ── RENDER CORE ────────────────────────────────────────────────────────────
function render(){renderNav();renderUserBar();renderTopbar();renderPage()}
function isEC(){return S.currentUser?.role==='ec'||S.currentUser?.role==='clerk'}
function isClerk(){return S.currentUser?.role==='clerk'}

function renderNav(){
  const nav=document.getElementById('nav');if(!S.currentUser){nav.innerHTML='';return}
  const ec=isEC();const unread=(S.messages||[]).filter(m=>!m.read&&m.fromRole==='participant').length;
  const barReco=S.participants.filter(p=>p.status==='inactive'&&p.lockers.length>0&&(p.statusReason||'').includes('Missing')).length;
  const pages=ec?[
    {id:'dashboard',icon:'ti-dashboard',label:'Dashboard'},
    {id:'participants',icon:'ti-users',label:'Participants'},
    {id:'past-participants',icon:'ti-user-off',label:'Past Participants'},
    {id:'attendance',icon:'ti-clipboard-check',label:'Attendance'},

function doLogin(){const email=(document.getElementById('l-email').value||'').trim().toLowerCase();const pw=document.getElementById('l-pw').value||'';const u=(S.users||[]).find(u=>u.email.toLowerCase()===email&&u.password===pw);if(u){S.currentUser={...u};save();render();return}const p=(S.participants||[]).find(u=>u.email.toLowerCase()===email&&u.pin===pw&&!u.isPast);if(p){S.currentUser={id:p.id,role:'participant',name:p.first+' '+p.last,email:p.email};save();render();return}document.getElementById('l-err').textContent='Invalid credentials.'}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function pgDashboard(){
  const ps=S.participants.filter(p=>!p.isPast);

  const unread=(S.messages||[]).filter(m=>!m.read&&m.fromRole==='participant').length;
  const rSoon=ps.filter(p=>{const rd=parseDate(p.renewalDate);return rd&&daysBetween(SYS_DATE,rd)<=7&&daysBetween(SYS_DATE,rd)>=0}).length;
  const warns=ps.filter(p=>(p.missedDateWarnings||[]).some(w=>!w.resolved)).length;
  const barReco=ps.filter(p=>p.status==='inactive'&&p.lockers.length>0).length;
  const ago30=new Date(SYS_DATE);ago30.setDate(ago30.getDate()-30);
  const mExp=ps.filter(p=>{const r=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='meeting');if(!r.length)return false;r.sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date));const l=parseDate(r[0].recordedDate||r[0].date);if(!l)return false;const e=new Date(l);e.setDate(e.getDate()+30);const d=daysBetween(SYS_DATE,e);return d>=0&&d<=7}).length;
  return`<div class="metric-grid"><div class="metric"><div class="metric-label">Active</div><div class="metric-value" style="color:#3b6d11">${active}</div></div><div class="metric"><div class="metric-label">Inactive</div><div class="metric-value" style="color:#e24b4a">${inactive}</div></div><div class="metric"><div class="metric-label">Barred</div><div class="metric-value" style="color:#ba7517">${barred}</div></div><div class="metric"><div class="metric-label">Available lockers</div><div class="metric-value">${avail}</div></div><div class="metric"><div class="metric-label">Active lockers</div><div class="metric-value">${actL}</div></div><div class="metric"><div class="metric-label">Broken</div><div class="metric-value" style="color:#e24b4a">${broken}</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px"><i class="ti ti-alert-triangle" style="color:#ba7517"></i> Alerts</div>
    ${rSoon?`<div class="alert alert-warning" style="cursor:pointer" onclick="goTo('renewals')"><i class="ti ti-calendar"></i> ${rSoon} renewal(s) due within 7 days</div>`:''}
    ${unread?`<div class="alert alert-info" style="cursor:pointer" onclick="goTo('messages')"><i class="ti ti-message-circle"></i> ${unread} unread message(s)</div>`:''}
    ${warns?`<div class="alert alert-danger" style="cursor:pointer" onclick="goTo('bars')"><i class="ti ti-clock"></i> ${warns} open missed-date warning(s)</div>`:''}
    ${barReco?`<div class="alert alert-warning" style="cursor:pointer" onclick="goTo('bars')"><i class="ti ti-ban"></i> ${barReco} participant(s) inactive with lockers — bar recommended</div>`:''}
    ${mExp?`<div class="alert alert-warning"><i class="ti ti-clock"></i> ${mExp} meeting credit(s) expiring in 7 days</div>`:''}
    ${!rSoon&&!unread&&!warns&&!barReco&&!mExp?'<p style="color:#888;font-size:13px">No alerts.</p>':''}
  </div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:10px"><i class="ti ti-users"></i> Participants</div>
    ${ps.slice(0,6).map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:.5px solid rgba(0,0,0,.07);cursor:pointer" onclick="viewP('${p.id}')"><div class="avatar" style="width:28px;height:28px;font-size:11px">${p.first[0]}${p.last[0]}</div><div style="flex:1;font-size:13px">${p.first} ${p.last}</div><span class="badge badge-${p.status}">${p.status}</span></div>`).join('')}
    <button class="btn btn-sm" style="margin-top:10px" onclick="goTo('participants')">View all <i class="ti ti-arrow-right"></i></button>

}

function pgParticipants(){return`<div style="display:flex;gap:10px;margin-bottom:14px"><div class="search-bar"><i class="ti ti-search"></i><input type="text" id="ps-q" placeholder="Search by name…" oninput="filterPS()"></div><select id="ps-f" onchange="filterPS()" style="width:140px"><option value="">All statuses</option><option value="active">Active</option><option value="inactive">Inactive</option><option value="barred">Barred</option></select></div><div class="card" style="padding:0"><table><thead><tr><th>Name</th><th>Status</th><th>Lockers</th><th>Renewal</th><th>Work</th><th>Credits</th><th style="width:100px"></th></tr></thead><tbody id="ps-body">${pRows(S.participants.filter(p=>!p.isPast))}</tbody></table></div>`}

function pgPastParticipants(){
  const past=S.participants.filter(p=>p.isPast);
  return`<div class="alert alert-info"><i class="ti ti-info-circle"></i> Past participants no longer have active lockers. They can be reinstated by an EC.</div>
  <div class="card" style="padding:0"><table><thead><tr><th>Name</th><th>Email</th><th>Past since</th><th>Reason</th><th></th></tr></thead><tbody>
  ${past.length?past.map(p=>`<tr><td><div class="avatar" style="width:24px;height:24px;font-size:10px;display:inline-flex">${p.first[0]}${p.last[0]}</div> ${p.first} ${p.last}</td><td style="color:#888">${p.email}</td><td>${fmtDate(p.pastSince||'')}</td><td style="font-size:11px;color:#888">${p.pastReason||'—'}</td><td><button class="btn btn-sm btn-success" onclick="reinstateP('${p.id}')"><i class="ti ti-user-check"></i> Reinstate</button> <button class="btn btn-sm" onclick="viewP('${p.id}')"><i class="ti ti-eye"></i></button></td></tr>`).join(''):

  </tbody></table></div>`;

function pRows(ps){
  const cm=monthKey(SYS_DATE);
  return ps.map(p=>{
    const rd=parseDate(p.renewalDate);const dl=rd?daysBetween(SYS_DATE,rd):null;const warn=dl!==null&&dl<=7&&dl>=0;
    const assignedThisMo=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});
    const checkedIn=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='work'&&monthKey(parseDate(a.recordedDate||a.date)||SYS_DATE)===cm).map(a=>a.recordedDate||a.date);
    const metCount=assignedThisMo.filter(d=>checkedIn.includes(d)).length;
    return`<tr style="cursor:pointer" onclick="viewP('${p.id}')"><td><span class="status-dot dot-${p.status}"></span>${p.first} ${p.last}</td><td><span class="badge badge-${p.status}">${p.status}</span></td><td>${p.lockers.map(n=>`<span class="pill-locker">#${n}</span>`).join('')||'—'}</td><td style="color:${warn?'#ba7517':'inherit'}">${fmtDate(p.renewalDate)}${warn?' ⚠':''}</td><td style="color:${metCount>=p.lockers.length?'#3b6d11':'#e24b4a'}">${metCount}/${p.lockers.length}</td><td>${p.credits||0}</td><td onclick="event.stopPropagation()" style="white-space:nowrap"><button class="btn btn-sm" onclick="viewP('${p.id}')"><i class="ti ti-eye"></i></button> <button class="btn btn-sm btn-danger" onclick="openModal('bar','${p.id}')"><i class="ti ti-ban"></i></button></td></tr>`;
  }).join('')||'<tr><td colspan="7" style="text-align:center;color:#888;padding:20px">No results.</td></tr>';
}
function filterPS(){const q=(document.getElementById('ps-q')||{value:''}).value.toLowerCase();const f=(document.getElementById('ps-f')||{value:''}).value;const res=S.participants.filter(p=>!p.isPast&&(!q||`${p.first} ${p.last}`.toLowerCase().includes(q))&&(!f||p.status===f));const el=document.getElementById('ps-body');if(el)el.innerHTML=pRows(res)}
function viewP(id){openModal('view-participant',id)}

function reinstateP(id){
  const p=S.participants.find(x=>x.id===id);if(!p)return;
  if(!confirm('Reinstate '+p.first+' '+p.last+' as an active participant?'))return;
  p.isPast=false;p.pastSince=null;p.pastReason=null;
  audit('REINSTATE',id,'Participant reinstated');
  refreshAll();save();render();toast('Reinstated: '+p.first+' '+p.last);
}

// ── MOVE TO PAST ───────────────────────────────────────────────────────────
function moveToPast(id,reason){
  const p=S.participants.find(x=>x.id===id);if(!p)return;
  // Release all lockers
  p.lockers.forEach(n=>{const l=S.lockers.find(x=>x.number===n);if(l){l.status='available';l.assignedTo=null}});
  p.lockers=[];p.barredLockers=[];
  p.isPast=true;p.pastSince=todayStr();p.pastReason=reason||'Moved to past';p.status='past';p.statusReason='Past participant';
  audit('MOVE_TO_PAST',id,'Moved to past: '+reason);
  save();render();toast(p.first+' '+p.last+' moved to past participants.');
}

  </div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px"><i class="ti ti-users"></i> Meeting status — all active participants</div>
  <table><thead><tr><th>Name</th><th>Last meeting</th><th>30-day expires</th><th>Days left</th><th>Status</th></tr></thead><tbody>
  ${S.participants.filter(p=>!p.isPast).map(p=>{const r=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='meeting');r.sort((a,b)=>new Date(b.recordedDate||b.date)-new Date(a.recordedDate||a.date));const l=r.length?parseDate(r[0].recordedDate||r[0].date):null;const e=l?new Date(l):null;if(e)e.setDate(e.getDate()+30);const dl=e?daysBetween(SYS_DATE,e):null;const ok=dl!==null&&dl>=0;return`<tr><td>${p.first} ${p.last}</td><td>${l?fmtDate(l):'—'}</td><td>${e?fmtDate(e.toISOString().split('T')[0]):'—'}</td><td>${dl!==null?dl+'d':'—'}</td><td><span class="badge ${ok?(dl<=7?'badge-barred':'badge-active'):'badge-inactive'}">${ok?(dl<=7?'Expiring soon':'Valid'):'None/expired'}</span></td></tr>`}).join('')}
  </tbody></table></div>`;
