<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lockers — Sage_OS</title>
<style>
:root{
  --bg:#fff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --border:#e2e8f0;--text:#1a202c;--text2:#4a5568;--text3:#718096;
  --accent:#1a56db;--accent2:#1e40af;
  --danger:#e53e3e;--success:#38a169;--warn:#d69e2e;
  --r:8px;
}
[data-theme=dark]{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --border:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:860px;margin:0 auto}

/* Header */
#hdr{display:flex;align-items:center;padding:0 14px;gap:8px;border-bottom:1.5px solid var(--border);height:50px;flex-shrink:0;background:var(--bg)}
#hdr-title{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:-.3px}
#hdr-addr{font-size:10px;color:var(--text3);font-family:monospace;flex:1;padding-left:8px}
#hdr-user{font-size:11px;color:var(--text2);font-weight:600;white-space:nowrap}
.btn{padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;font-family:inherit}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;border:1.5px solid}
.btn-warning{background:#D69E2E;color:#fff;border-color:#D69E2E;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;border:1.5px solid}
.btn-sm{padding:3px 8px;font-size:11px}

/* Map */
#map-wrap{padding:8px 14px 6px;border-bottom:1.5px solid var(--border);background:var(--bg2)}
.map-row-wrap{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.map-row-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;width:50px;text-align:right;flex-shrink:0}
.map-row{display:flex;gap:4px}
.map-box{min-width:36px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;cursor:pointer;transition:all .15s;border:1.5px solid transparent;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;letter-spacing:.03em}
.map-box.active{color:#fff}
.map-box.available{border-width:1.5px;border-style:solid;color:var(--text3)}

/* Breadcrumb */
.breadcrumb{font-size:11px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.bc-seg{cursor:pointer;color:var(--accent);font-weight:600}
.bc-seg:hover{text-decoration:underline}
.bc-home{cursor:pointer;color:var(--text3);font-weight:700}
.bc-home:hover{color:var(--accent)}

/* Tree */
#tree-wrap{flex:1;overflow-y:auto;padding:12px 14px}
.tree-grid{display:grid;grid-template-columns:1fr;gap:5px}
.tree-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;border:1.5px solid var(--border);transition:background .15s;background:var(--bg)}
.tree-item:hover{background:var(--bg2)}
.tree-item.locked{cursor:pointer;opacity:.7}
.t-body{flex:1;min-width:0;display:flex;align-items:baseline;flex-wrap:wrap;gap:0 5px}
.t-label{font-weight:700;font-size:13px;white-space:nowrap}
.t-sep{color:var(--text3);font-size:13px;font-weight:400}
.t-desc{font-size:12px;color:var(--text3)}
.t-arrow{color:var(--text3);font-size:14px;flex-shrink:0;font-weight:300}
.t-lock{font-size:12px;flex-shrink:0;color:var(--text3)}

/* Screens */
.screen{}
.screen-title{font-size:17px;font-weight:700;margin-bottom:10px}
.section-header{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:14px 0 6px}
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card h3{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text2)}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-row{display:flex;gap:6px;margin-bottom:6px;font-size:13px;align-items:baseline}
.info-lbl{color:var(--text3);font-weight:600;min-width:110px;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge-green{background:#d1fae5;color:#065f46}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:var(--bg3);color:var(--text3)}
.alert{padding:10px 14px;border-radius:var(--r);margin-bottom:12px;font-size:13px;font-weight:600;border:1.5px solid}
.alert-danger{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.alert-warn{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.alert-success{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.alert-info{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.flex{display:flex}.gap-2{gap:8px}.gap-3{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.w-full{width:100%}

/* Locker grid */
.locker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:4px;max-height:300px;overflow-y:auto;padding:8px;background:var(--bg3);border-radius:var(--r);border:1.5px solid var(--border)}
.l-chip{padding:5px 3px;border-radius:5px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.l-chip.available{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.l-chip.assigned{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.l-chip.broken{background:#fce7f3;color:#9d174d;border-color:#f9a8d4}
.l-chip.selected{box-shadow:0 0 0 2px var(--accent)!important;border-color:var(--accent)!important}
.locker-legend{display:flex;gap:10px;font-size:11px;margin-bottom:6px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:2px}

/* Session timer */
.session-card{padding:10px 12px;border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:6px;display:flex;align-items:center;gap:10px;background:var(--bg)}
.s-timer{font-size:18px;font-weight:800;min-width:48px;text-align:center}
.s-green{color:#38a169}.s-orange{color:#d97706}.s-red{color:#e53e3e;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Chat */
.chat-msgs{height:240px;overflow-y:auto;padding:8px;background:var(--bg3);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:8px}
.chat-msg{margin-bottom:8px}
.cm-user{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:2px}
.cm-body{background:var(--bg);padding:6px 10px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;display:inline-block;max-width:85%}
.chat-msg.mine{text-align:right}
.chat-msg.mine .cm-body{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Command bar */
#cmd-wrap{border-top:1.5px solid var(--border);padding:7px 14px;background:var(--bg2);flex-shrink:0}
.cmd-addr{font-size:10px;color:var(--text3);font-family:monospace;margin-bottom:4px;letter-spacing:.02em}
.cmd-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.cmd-prompt{color:var(--accent);font-weight:800;font-family:monospace;font-size:14px}
#cmd-input{flex:1;padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace;transition:border .15s}
#cmd-input:focus{outline:none;border-color:var(--accent)}
.cmd-sugs{display:flex;gap:4px;flex-wrap:wrap}
.cmd-sug{padding:3px 9px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .1s;display:flex;align-items:center;gap:5px;max-width:200px}
.cmd-sug:hover,.cmd-sug.hi{background:var(--accent);color:#fff;border-color:var(--accent)}
.cs-key{font-family:monospace;font-weight:700;white-space:nowrap}
.cs-lbl{font-size:10px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-preview{font-size:10px;color:var(--accent);font-family:monospace;margin-top:2px;opacity:.8}

/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:12px;padding:26px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.25);position:relative}
.modal h2{font-size:17px;font-weight:800;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:14px;cursor:pointer;font-size:18px;color:var(--text3);background:none;border:none;line-height:1}
.modal-close:hover{color:var(--text)}

/* Coming soon */
.coming-soon{text-align:center;padding:48px 20px;color:var(--text3)}
.cs-icon{font-size:36px;margin-bottom:8px}
.cs-addr{font-family:monospace;font-size:12px;color:var(--accent);margin-bottom:6px;background:var(--bg2);padding:4px 10px;border-radius:4px;display:inline-block}
.cs-label{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.cs-note{font-size:12px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;background:var(--bg3);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2);cursor:pointer}

/* Participant result */
.p-result{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-top:10px}
.p-name{font-size:16px;font-weight:800;margin-bottom:8px}
.p-lockers{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.p-locker-tag{background:var(--accent);color:#fff;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700}

/* Message board */
.mb-post{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.mb-meta{font-size:10px;color:var(--text3);margin-bottom:4px}
.mb-text{font-size:13px}
</style>
</head>

const SUPA_URL = 'https://aqwqugxxxxgrsgtiqwxn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxd3F1Z3h4eHhncnNndGlxd3huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTI1MDEsImV4cCI6MjA5NjMyODUwMX0.ypwI87S3QNZFTNO7jT309zuOvRGbNpcu7N3JsrvjTnQ';
let _session = null;

async function supa(table, method='GET', body=null, query='', prefer='') {
  const url = `${SUPA_URL}/rest/v1/${table}${query}`;
  const token = _session?.access_token ?? SUPA_KEY;
  const res = await fetch(url, {
    method,
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json', 'Prefer': prefer || '' },
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) throw new Error(`${method} ${table}: ${await res.text()}`);
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

async function supaSignIn(email, password) {
  const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  if (!res.ok) throw new Error('Invalid credentials');
  const data = await res.json();
  _session = data;
  return data;
}

async function supaSignOut() {
  if (_session) {
    await fetch(`${SUPA_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${_session.access_token}` }
    }).catch(() => {});
  }
  _session = null;
}

  delete: (t, q) => supa(t, 'DELETE', null, q),
  update: (t, d, q) => supa(t, 'PATCH', d, q),
  rpc: (fn, params) => supa(`rpc/${fn}`, 'POST', params),

function lockerFromDb(r) {

async function loadAll() {
  if (S.loaded) return;
  const safe = (p) => p.catch(e => { console.warn('loadAll query failed:', e?.message||e); return []; });
  try {
    const [partRows, lockerRows, barRows, ciRows, chatRows, userRows, btRows, sunRows, pwRows, msgRows, ctrRows, setupRows] = await Promise.all([
      safe(db.select('sl_participants','?select=*&order=name.asc')),
      safe(db.select('sl_lockers','?select=*&order=id.asc')),
      safe(db.select('sl_bar_recs','?select=*&order=date.desc')),
      safe(db.select('sl_checkins',`?select=*&date=eq.${isoDate()}`)),
      safe(db.select('sl_chat','?select=*&order=ts.asc&limit=200')),
      safe(db.select('sl_users','?select=*')),
      safe(db.select('sl_bag_tag','?select=*')),
      safe(db.select('sl_sunday_meetings','?select=*&order=date.desc')),
      safe(db.select('sl_pw_reset','?select=*&order=date.desc')),
      safe(db.select('sl_part_messages','?select=*&order=ts.desc&limit=100')),
      safe(db.select('sl_ci_counter',`?date=eq.${isoDate()}`)),
      safe(db.select('sl_setup','?key=like.info.*')),
    ]);
    const lockerObj = {};
    (lockerRows||[]).forEach(r => { lockerObj[r.id] = lockerFromDb(r); });
    if (Object.keys(lockerObj).length === 0) {
      for (let i=1; i<=500; i++) lockerObj[i] = { id:i, status:'available', participantId:null, notes:'', working:true, assignedDate:null, releasedDate:null, neverAssigned:true };
    }
    S.data.participants = (partRows||[]).map(participantFromDb);
    S.data.lockers = lockerObj;
    S.data.barRecs = (barRows||[]).map(barRecFromDb);
    S.data.checkIns = ciRows||[];
    S.data.chatMessages = (chatRows||[]).map(m=>({id:m.id,user:m.user_name,role:m.role,text:m.text,ts:m.ts}));
    S.data.users = (userRows||[]).map(userFromDb);
    S.data.bagTag = btRows||[];
    S.data.sundayMeetings = sunRows||[];
    S.data.pwResetLog = (pwRows||[]).map(r=>({id:r.id,targetUser:r.target_user,resetBy:r.reset_by,date:r.date}));
    S.data.partMessages = (msgRows||[]);
    if (ctrRows && ctrRows.length > 0) S.data.checkInCounter = { count:ctrRows[0].count, date:ctrRows[0].date };
    const infoPages = {};
    (setupRows||[]).forEach(r => {
      if (r.key && r.key.startsWith('info.')) infoPages[r.key.slice(5)] = r.value || '';
    });
    S.data.infoPages = infoPages;
    S.loaded = true;
  } catch(e) {
    console.error('loadAll fatal:', e);
  }
}

// ════════════════════════════════════════════════════
//  NAV HELPERS
// ════════════════════════════════════════════════════
function getNode(path) {
  const [cat, note, detail] = path;
  if (!cat) return null;
  const catNode = DICT[cat];
  if (!catNode) return null;
  if (!note) return catNode;
  const noteNode = catNode.notes?.[note];
  if (!noteNode) return null;
  if (!detail) return noteNode;
  return noteNode.details?.[detail] || null;
}

function getChildren(path) {
  if (path.length === 0) return Object.entries(DICT).filter(([k])=>canSee(k)).map(([k,v])=>({key:k,...v,path:[k]}));
  const [cat, note] = path;
  if (path.length === 1) {
    const n = DICT[cat]?.notes;
    return n ? Object.entries(n).map(([k,v])=>({key:k,...v,path:[cat,k]})) : [];
  }
  if (path.length === 2) {
    const d = DICT[cat]?.notes?.[note]?.details;
    return d ? Object.entries(d).map(([k,v])=>({key:k,...v,path:[cat,note,k]})) : [];
  }
  return [];
}

function isLeaf(path) {
  if (path.length === 0) return false;
  const node = getNode(path);
  if (!node) return false;
  if (path.length === 1) return !node.notes || Object.keys(node.notes).length === 0;
  if (path.length === 2) return !node.details || Object.keys(node.details).length === 0;
  return true;
}

function catOf(path) { return path[0] || null; }

function authRequired(path) {
  if (!path.length) return null;
  return DICT[path[0]]?.auth || null;
}

function hasAccess(path) {
  const req = authRequired(path);
  if (!req) return true;
  if (!S.user) return false;
  const role = S.user.role;
  if (req === 'part') return role === 'part';
  if (req === 'sec') return role === 'sec';
  if (req === 'ec') return role === 'ec' || role === 'clerk';
  if (req === 'clerk') return role === 'clerk';
  return false;
}

// Visibility: which categories appear in map + tree based on current role
function canSee(catKey) {
  const role = S.user?.role || null;
  if (catKey === 'info') return true;
  if (catKey === 'part') return !role || role === 'part';
  if (catKey === 'sec')  return role === 'sec';
  if (catKey === 'EC')   return role === 'ec' || role === 'clerk';
  if (catKey === 'Clerk') return role === 'clerk';
  return false;
}

// Abbreviation for map boxes: ≤3-char key → uppercase key; else → first 4 chars of label (alphanum only)
const mapAbbr = (key, label) => {
  if (key.length <= 3) return key.toUpperCase();
  const src = (label || key).replace(/[^a-zA-Z0-9]/g, '');
  return src.slice(0, 4).toUpperCase();
};

function renderMap() {
  const path = S.path;
  // Root level: only visible categories
  const visibleCats = Object.keys(DICT).filter(canSee);
  const levels = [
    { label:'Category', items: visibleCats, nodeMap: key => DICT[key] },
  ];
  if (path.length >= 1 && DICT[path[0]]?.notes) {
    const notes = DICT[path[0]].notes;
    levels.push({ label:'Note', items: Object.keys(notes), nodeMap: key => notes[key] });
  }
  if (path.length >= 2 && DICT[path[0]]?.notes?.[path[1]]?.details) {
    const details = DICT[path[0]].notes[path[1]].details;
    levels.push({ label:'Detail', items: Object.keys(details), nodeMap: key => details[key] });
  }

  return levels.map((lv, li) => {
    const rows = lv.items.map((key, i) => {
      const node = lv.nodeMap(key);
      const color = SLOT_COLORS[i % 10];
      const isActive = path[li] === key;
      const abbr = mapAbbr(key, node?.label || key);
      const style = isActive
        ? `background:${color};border-color:${color};color:#fff`
        : `border-color:${color};color:${color};background:${color}18`;
      return `<div class="map-box ${isActive?'active':'available'}" style="${style}" title="${key}" onclick="nav(${pathJs(path.slice(0,li).concat(key))})">${abbr}</div>`;
    }).join('');
    return `<div class="map-row-wrap"><span class="map-row-lbl">${lv.label}</span><div class="map-row">${rows}</div></div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  COMMAND BAR — Sage_OS Command Protocol v1
// ════════════════════════════════════════════════════

// Command history (last 10 executed commands as path arrays)
const _cmdHistory = [];
let _cmdHistIdx = -1;

// Prompt shows last 1-2 path segments so user always knows context
function getCmdPrompt() {
  if (S.path.length === 0) return 'Lockers';
  if (S.path.length === 1) return S.path[0];
  return S.path.slice(-2).join('.');
}

// Placeholder adapts to current depth
function getCmdPlaceholder() {
  if (S.path.length === 0) return 'type a category (e.g. EC, info, sec)…';
  if (S.path.length === 1) return 'type a note, or .. to go up…';
  return 'type an action, .. to go up, or full address…';
}

// Fuzzy suggestion matching — prefix first, then contains, then label
function getSuggestions(input) {
  const children = getChildren(S.path);
  if (!input) return children.slice(0, 5);
  const s = input.toLowerCase();
  const prefix   = children.filter(c => c.key.toLowerCase().startsWith(s));
  const contains = children.filter(c => !c.key.toLowerCase().startsWith(s) && c.key.toLowerCase().includes(s));
  const label    = children.filter(c => !c.key.toLowerCase().includes(s) && (c.label||'').toLowerCase().includes(s));
  return [...prefix, ...contains, ...label].slice(0, 5);
}

// Parse a command string into a navigation target path
// Supports: relative keys, '..' / '...', '.sibling', 'Cat.note', full addresses
function parseCommand(raw) {
  // Strip dictionary name prefix so displayed addresses work as-is
  let s = raw.trim().replace(/^Lockers\./i, '');
  if (!s) return null;

  // Special: go up
  if (s === '..' || s === 'back') return S.path.slice(0, -1);
  if (s === '...' || s === 'root' || s === '/') return [];

  // Sibling navigation: starts with '.'
  if (s.startsWith('.') && s.length > 1) {
    const rel = s.slice(1).split('.');
    if (S.path.length >= 1) return [S.path[0], ...rel];
    return rel;
  }

  // Contains a dot separator — could be relative or absolute
  if (s.includes('.')) {
    const parts = s.split('.');
    // If first segment is a known category, treat as absolute
    if (DICT[parts[0]]) return parts;
    // Otherwise treat as relative from current cat
    if (S.path.length >= 1) return [S.path[0], ...parts];
    return parts;
  }

  // Single token — check if it's a category name (absolute jump)
  if (DICT[s]) return [s];
  const catKey = Object.keys(DICT).find(k => k.toLowerCase() === s.toLowerCase());
  if (catKey) return [catKey];

  // Relative: look in current children (exact match first)
  const children = getChildren(S.path);
  const exact = children.find(c => c.key.toLowerCase() === s.toLowerCase());
  if (exact) return exact.path;

  // Relative: prefix match
  const prefix = children.find(c => c.key.toLowerCase().startsWith(s.toLowerCase()));
  if (prefix) return prefix.path;

  return null;
}

// When a typed path has trailing non-navigable segments, strip them as a search query.
// e.g. Clerk.search.all.jeremy_wolff → nav to Clerk.search.all, query='jeremy wolff'
function parseCommandWithQuery(raw) {
  const path = parseCommand(raw);
  if (!path) return { path: null, query: '' };

  // Walk backward: find the deepest navigable prefix
  for (let i = path.length; i >= 1; i--) {
    const slice = path.slice(0, i);
    const key = slice.join('.');
    if (SCREENS[key] || getChildren(slice).length > 0) {
      const trailing = path.slice(i).join(' ').replace(/_/g, ' ').trim();
      return { path: slice, query: trailing };
    }
  }
  return { path, query: '' };
}

function renderCmdBar() {
  const sugs = getSuggestions(S.cmdInput);
  const activeSug = S.cmdSugIdx >= 0 ? sugs[S.cmdSugIdx] : null;
  // Preview target address for highlighted suggestion
  const previewPath = activeSug ? activeSug.path : (sugs[0] ? sugs[0].path : null);
  const previewAddr = previewPath ? 'Lockers.' + previewPath.join('.') : '';

  const sugHtml = sugs.map((c, i) => {
    const hi = i === S.cmdSugIdx;
    return `<div class="cmd-sug${hi?' hi':''}" onclick="cmdSugClick(${i})" title="${esc(c.desc||'')}">
      <span class="cs-key">${esc(c.key)}</span>
      <span class="cs-lbl">${esc(c.label||'')}</span>
    </div>`;
  }).join('');

  const currentAddr = S.path.length ? 'Lockers.' + S.path.join('.') : 'Lockers';
  return `
    <div class="cmd-addr">${esc(currentAddr)}</div>
    <div class="cmd-row">
      <span class="cmd-prompt">${esc(getCmdPrompt())} &rsaquo;</span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="${esc(getCmdPlaceholder())}"
        value="${esc(S.cmdInput)}"
        oninput="cmdInput(this.value)"
        onkeydown="cmdKey(event)">
    </div>
    <div class="cmd-sugs">${sugHtml}</div>
    ${previewAddr && S.cmdInput ? `<div class="cmd-preview">→ ${esc(previewAddr)}</div>` : ''}`;
}

function refreshCmdBar() {
  const bar = document.getElementById('cmd-wrap');
  if (bar) { bar.innerHTML = renderCmdBar(); focusCmdInput(); }
}

function cmdInput(v) {
  S.cmdInput = v;
  S.cmdSugIdx = -1;
  _cmdHistIdx = -1;
  refreshCmdBar();
}

function cmdSugClick(i) {
  const sugs = getSuggestions(S.cmdInput);
  if (sugs[i]) cmdNavigate(sugs[i].path);
}

function cmdNavigate(path) {
  if (!path) return;
  // Push to history (avoid consecutive duplicates)
  const last = _cmdHistory[0];
  if (!last || last.join('.') !== path.join('.')) _cmdHistory.unshift(path);
  if (_cmdHistory.length > 10) _cmdHistory.pop();
  _cmdHistIdx = -1;
  S.cmdInput = '';
  S.cmdSugIdx = -1;
  treeClick(path);
}

function cmdKey(e) {
  const sugs = getSuggestions(S.cmdInput);

  if (e.key === 'Tab') {
    e.preventDefault();
    const target = S.cmdSugIdx >= 0 ? sugs[S.cmdSugIdx] : sugs[0];
    if (target) {
      // Tab fills in the key text, doesn't navigate yet — lets user keep typing
      S.cmdInput = target.key;
      S.cmdSugIdx = -1;
      refreshCmdBar();
    }

  } else if (e.key === 'Enter') {
    e.preventDefault();
    const raw = S.cmdInput.trim();
    if (S.cmdSugIdx >= 0 && sugs[S.cmdSugIdx]) {
      cmdNavigate(sugs[S.cmdSugIdx].path);
    } else if (raw) {
      const { path, query } = parseCommandWithQuery(raw);
      if (path !== null) {
        if (query) S.cmdSearchQuery = query;
        cmdNavigate(path);
      } else {
        const p = document.querySelector('.cmd-preview');
        if (p) { p.textContent = `✕ unknown: ${raw}`; p.style.color='var(--danger)'; }
      }
    }

  } else if (e.key === 'Escape') {
    e.preventDefault();
    if (S.cmdInput.trim()) {
      // First Esc: clear text
      S.cmdInput = '';
      S.cmdSugIdx = -1;
      refreshCmdBar();
    } else {
      // Second Esc (empty input): go up one level
      if (S.path.length > 0) nav(S.path.slice(0, -1));
      else document.getElementById('cmd-input')?.blur();
    }

  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!S.cmdInput && _cmdHistory.length > 0) {
      // Scroll through history when input is empty
      _cmdHistIdx = Math.min(_cmdHistIdx + 1, _cmdHistory.length - 1);
      S.cmdInput = _cmdHistory[_cmdHistIdx].join('.');
      refreshCmdBar();
    } else {
      S.cmdSugIdx = Math.min(S.cmdSugIdx + 1, sugs.length - 1);
      refreshCmdBar();
    }

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (!S.cmdInput && _cmdHistory.length > 0) {
      _cmdHistIdx = Math.max(_cmdHistIdx - 1, 0);
      S.cmdInput = _cmdHistory[_cmdHistIdx].join('.');
      refreshCmdBar();
    } else if (S.cmdSugIdx > 0) {
      S.cmdSugIdx = S.cmdSugIdx - 1;
      refreshCmdBar();
    } else if (S.cmdSugIdx === 0) {
      S.cmdSugIdx = -1;
      refreshCmdBar();
    }

  } else if (e.key === 'Backspace' && !S.cmdInput) {
    // Backspace on empty → go up a level (power user shortcut)
    e.preventDefault();
    if (S.path.length > 0) nav(S.path.slice(0, -1));
  }
}

function focusCmdInput() {
  const inp = document.getElementById('cmd-input');
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

// ════════════════════════════════════════════════════
//  TREE RENDERER (non-leaf levels)
// ════════════════════════════════════════════════════
function renderTree() {
  const children = getChildren(S.path);
  if (!children.length) return '<div class="coming-soon"><div class="cs-note">No items at this level.</div></div>';

  const items = children.map((child, i) => {
    const color = SLOT_COLORS[i % 10];
    const locked = authRequired(child.path) && !hasAccess(child.path);
    const childCount = child.notes ? Object.keys(child.notes).length
      : child.details ? Object.keys(child.details).length : 0;
    const countBadge = childCount ? `<span class="badge badge-gray">${childCount}</span>` : '';
    const lockIcon = locked ? `<span class="t-lock">⟩</span>` : `<span class="t-arrow" style="color:${color}">⟩</span>`;
    const desc = child.desc ? `<span class="t-sep">—</span><span class="t-desc">${esc(child.desc)}</span>` : '';
    return `
      <div class="tree-item${locked?' locked':''}" onclick="treeClick(${pathJs(child.path)})"
           style="border-left:4px solid ${color}">
        <div class="t-body">
          <span class="t-label">${esc(child.label)}</span>${desc}
        </div>
        ${countBadge}
        ${lockIcon}
      </div>`;
  });

  return `<div class="tree-grid">${items.join('')}</div>`;
}

function treeClick(path) {
  const req = authRequired(path);
  if (req && !hasAccess(path)) {
    showLoginModal(req, () => { nav(path); loadAll(); });
    return;
  }
  nav(path);
}

//  AUTH / LOGIN MODAL
// ════════════════════════════════════════════════════
let _loginCallback = null;

function showLoginModal(role, callback) {
  _loginCallback = callback || null;
  const labels = { part:'Participant', sec:'Security', ec:'EC', clerk:'Clerk' };
  const lbl = labels[role] || 'Staff';
  const isShared = role === 'part';
  document.getElementById('modal-box').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>Log In — ${lbl}</h2>
    <p class="modal-sub">${isShared ? 'Shared participant access' : 'Enter your credentials'}</p>
    <div id="login-err"></div>
    ${isShared ? '' : '<div class="form-group"><label>Email</label><input id="li-email" type="email" placeholder="your email" autocomplete="email"></div>'}
    <div class="form-group"><label>Password</label><input id="li-pw" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin('${role||''}')"></div>
    <button class="btn btn-primary w-full" onclick="doLogin('${role||''}')">Log In</button>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById(isShared ? 'li-pw' : 'li-email');
    if (inp) inp.focus();
  }, 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  _loginCallback = null;
}

async function doLogin(role) {
  const errEl = document.getElementById('login-err');
  errEl.innerHTML = '';
  const pw = document.getElementById('li-pw')?.value?.trim();
  if (!pw) { errEl.innerHTML = '<div class="alert alert-danger">Password required.</div>'; return; }

  try {
    if (role === 'part') {
      // Participant: shared password stored in sl_setup under key 'part.password'
      const storedPw = S.data.setup?.['part.password'];
      if (!storedPw) throw new Error('Participant access is not configured. Contact staff.');
      if (pw !== storedPw) throw new Error('Invalid participant password.');
      S.user = { id:'part', name:'Participant', role:'part' };
    } else {
      // Staff: first try sl_users username+password (existing app pattern)
      const username = document.getElementById('li-email')?.value?.trim();
      if (!username) { errEl.innerHTML = '<div class="alert alert-danger">Username required.</div>'; return; }
      // Authenticate via Supabase Auth, then fetch role from sl_users
      const session = await supaSignIn(username, pw);
      const token = session.access_token;
      const authedEmail = session.user?.email;
      if (!token || !authedEmail) throw new Error('Authentication failed.');
      // Fetch this user's record from sl_users using their authenticated session
      const uRows = await fetch(`${SUPA_URL}/rest/v1/sl_users?select=id,name,email,role`, {
        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
      }).then(r => r.json());
      const ae = authedEmail.toLowerCase();
      const matched = Array.isArray(uRows) ? uRows.find(u => u.email?.toLowerCase()===ae || u.username?.toLowerCase()===ae) : null;
      if (!matched) throw new Error('No staff record found for this account. Contact admin to link your account.');
      S.user = { id:matched.id, name:matched.name||authedEmail, role:(matched.role||'').toLowerCase(), access_token:token };
    }
    closeModal();
    S.loaded = false; // force fresh load with new session
    await loadAll();
    if (_loginCallback) {
      _loginCallback();
    } else {
      // header login: navigate to the user's home category
      const roleHome = { clerk:'Clerk', ec:'EC', sec:'sec', part:'part' };
      const home = roleHome[S.user?.role];
      if (home) nav([home]);
      else render();
    }
  } catch(e) {
    errEl.innerHTML = `<div class="alert alert-danger">${esc(e.message)}</div>`;
  }
}

async function doLogout() {
  await supaSignOut();
  S.user = null;
  S.loaded = false;
  S.data = { participants:[], lockers:{}, barRecs:[], checkIns:[], chatMessages:[], users:[],
    bagTag:[], sundayMeetings:[], pwResetLog:[], partMessages:[], checkInCounter:{count:0,date:''}, sessions:{} };
  if (S.chatPoll) { clearInterval(S.chatPoll); S.chatPoll = null; }
  nav([]);
}

async function logCheckIn(pid, name) {
  const ci = { id:genId(), participant_id:pid, name, type:'in', date:isoDate(), ts:new Date().toISOString() };
  S.data.sessions[pid] = { start:Date.now(), name };
  await saveCheckIn(ci);
  // bump counter
  const today = isoDate();
  const ctr = S.data.checkInCounter;
  const newCtr = { count:(ctr.date===today?ctr.count:0)+1, date:today };
  await saveCICounter(newCtr);
  alert(`✅ ${name} checked in.`);
  render();
}

async function logCheckOut(pid, name) {
  delete S.data.sessions[pid];
  const ci = { id:genId(), participant_id:pid, name, type:'out', date:isoDate(), ts:new Date().toISOString() };
  await saveCheckIn(ci);
  alert(`🚪 ${name} checked out.`);
  render();
}

async function saveParticipantForm(e, cat, pid) {
  e.preventDefault();
  const f = e.target;
  const p = {
    id: pid,
    name: f.name.value.trim(),
    memberSince: f.memberSince.value || null,
    renewedThru: f.renewedThru.value || null,
    workShiftsRequired: parseInt(f.workShiftsRequired.value)||1,
    lockers: f.lockers.value.split(',').map(x=>parseInt(x.trim())).filter(n=>!isNaN(n)),
    workDates: f.workDates.value.split(',').map(x=>x.trim()).filter(Boolean),
    powerLunchDate: f.powerLunchDate.value || null,
    notes: f.notes.value.trim(),
    // preserve existing fields
    ...(() => { const ex=S.data.participants.find(x=>x.id===pid); return ex?{renewed:ex.renewed,barred:ex.barred,bars:ex.bars,missedShifts:ex.missedShifts,mandatoryShifts:ex.mandatoryShifts,sundayAttendance:ex.sundayAttendance,powerLunchAttendance:ex.powerLunchAttendance,isClerk:ex.isClerk,isEC:ex.isEC,archived:ex.archived}:{renewed:false,barred:false,bars:[],missedShifts:[],mandatoryShifts:[],sundayAttendance:[],powerLunchAttendance:[],isClerk:false,isEC:false,archived:false}; })()
  };
  // Update lockers in locker table
  const oldP = S.data.participants.find(x=>x.id===pid);
  if (oldP) {
    (oldP.lockers||[]).forEach(ln=>{ if(S.data.lockers[ln]&&S.data.lockers[ln].participantId===pid){ S.data.lockers[ln].status='available'; S.data.lockers[ln].participantId=null; S.data.lockers[ln].releasedDate=isoDate(); saveLocker(S.data.lockers[ln]); }});
  }
  p.lockers.forEach(ln=>{ if(S.data.lockers[ln]){ S.data.lockers[ln].status='assigned'; S.data.lockers[ln].participantId=pid; S.data.lockers[ln].assignedDate=isoDate(); S.data.lockers[ln].neverAssigned=false; saveLocker(S.data.lockers[ln]); }});
  await saveParticipant(p);
  nav([cat,'participants','search']);
}

}

function renewSearch(cat) {
  const q = document.getElementById('rn-q')?.value?.trim().toLowerCase();
  const p = S.data.participants.find(x=>!x.archived&&(x.name.toLowerCase().includes(q)||x.lockers.some(l=>String(l)===q)));
  const el = document.getElementById('rn-result');
  if (!el) return;
  if (!p) { el.innerHTML = '<div class="alert alert-warn">Not found.</div>'; return; }
  const shifts = p.workShiftsRequired || (p.lockers||[]).length || 1;
  // Build next-month date defaults for work shifts
  const nextMonth = new Date(); nextMonth.setMonth(nextMonth.getMonth()+1);
  const nm = nextMonth.toISOString().slice(0,7);
  let shiftInputs = '';
  for (let i=0; i<shifts; i++) {
    shiftInputs += `<div class="form-group"><label>Work Date ${i+1}</label><input class="rn-workdate" type="date" placeholder="${nm}-xx"></div>`;
  }
  const missedNote = (p.missedShifts||[]).length > 0
    ? `<div class="alert alert-warn" style="margin-bottom:8px">Has ${p.missedShifts.length} missed shift(s) — these will be cleared on renewal.</div>`
    : '';
  el.innerHTML = `<div class="p-result">
    <div class="p-name">${esc(p.name)}</div>
    <div class="info-row"><span class="info-lbl">Status</span><span>${p.renewed?'<span class="badge badge-green">Already Renewed</span>':'<span class="badge badge-yellow">Not Yet Renewed</span>'}</span></div>
    <div class="info-row"><span class="info-lbl">Lockers</span><span>${(p.lockers||[]).map(l=>`#${l}`).join(', ')||'None'}</span></div>
    <div class="info-row"><span class="info-lbl">Shifts Required</span><span>${shifts}</span></div>
    ${missedNote}
    <div class="section-header mt-3">Assign New Work Dates (${shifts} required)</div>
    ${shiftInputs}
    <div class="form-group"><label>Renewed Thru</label><input id="rn-thru" type="date" value="${nm}-15"></div>
    <button class="btn btn-primary mt-3" onclick="doRenew('${p.id}','${cat}')">Confirm Renewal</button>
  </div>`;
}

async function doRenew(pid, cat) {
  const p = S.data.participants.find(x=>x.id===pid);
  if (!p) return;
  const workDateInputs = [...document.querySelectorAll('.rn-workdate')].map(i=>i.value).filter(Boolean);
  const renewedThru = document.getElementById('rn-thru')?.value || null;
  p.renewed = true;
  p.renewedThru = renewedThru;
  if (workDateInputs.length) {
    p.workDates = [...(p.workDates||[]).filter(d => d > isoDate()), ...workDateInputs].sort();
  }
  p.missedShifts = [];
  p.workShiftsRequired = (p.lockers||[]).length || p.workShiftsRequired || 1;
  await saveParticipant(p);
  const el = document.getElementById('rn-result');
  if (el) el.innerHTML = `<div class="alert alert-success">${esc(p.name)} renewed through ${fmtDate(renewedThru)}. ${workDateInputs.length} work date(s) assigned. Missed shifts cleared.</div>`;
  render();
}

async function releaseLocker(cat) {
  const num = parseInt(document.getElementById('rl-num')?.value);
  if (!num || num<1 || num>500) { alert('Enter a valid locker number (1–500).'); return; }
  const l = S.data.lockers[num];
  const el = document.getElementById('rl-result');
  if (!l || l.status === 'available') { el.innerHTML = '<div class="alert alert-info">Locker is already available.</div>'; return; }
  const p = l.participantId ? S.data.participants.find(x=>x.id===l.participantId) : null;
  if (!confirm(`Release locker #${num}${p?` from ${p.name}`:''}?`)) return;
  l.status = 'available'; l.participantId = null; l.releasedDate = isoDate();
  await saveLocker(l);
  if (p) { p.lockers = (p.lockers||[]).filter(x=>x!==num); await saveParticipant(p); }
  el.innerHTML = `<div class="alert alert-success">Locker #${num} released.</div>`;
  render();
}

function renderLockerInventory(cat) {
  const lockers = S.data.lockers;
  const available = Object.values(lockers).filter(l=>l.status==='available'&&l.working).length;
  const assigned = Object.values(lockers).filter(l=>l.status==='assigned').length;
  const broken = Object.values(lockers).filter(l=>!l.working).length;
  const chips = Object.values(lockers).map(l=>{
    const cls = !l.working ? 'broken' : l.status === 'assigned' ? 'assigned' : 'available';
    const p = l.participantId ? S.data.participants.find(x=>x.id===l.participantId) : null;
    return `<div class="l-chip ${cls}" title="${cls}${p?' — '+p.name:''}" onclick="lockerClick(${l.id},'${cat}')">${l.id}</div>`;
  }).join('');
  return `<div class="screen">
    <div class="screen-title">Locker Inventory</div>
    <div class="locker-legend">
      <div class="leg-item"><div class="leg-dot" style="background:#d1fae5;border:1px solid #6ee7b7"></div> Available (${available})</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fee2e2;border:1px solid #fca5a5"></div> Assigned (${assigned})</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fce7f3;border:1px solid #f9a8d4"></div> Broken (${broken})</div>
    </div>
    <div class="locker-grid">${chips}</div>
  </div>`;
}

function lockerClick(id, cat) {
  const l = S.data.lockers[id];
  if (!l) return;
  const p = l.participantId ? S.data.participants.find(x=>x.id===l.participantId) : null;
  const msg = `Locker #${id}\nStatus: ${l.status}\n${p?'Assigned to: '+p.name:'Unassigned'}\n\nMark as: (1) Available  (2) Broken/Fixed  (3) Cancel`;
  const choice = prompt(msg+'\n\nEnter 1, 2, or 3:');
  if (choice === '1' && l.status !== 'available') {
    l.status='available'; l.working=true; l.participantId=null; l.releasedDate=isoDate();
    if (p) { p.lockers=(p.lockers||[]).filter(x=>x!==id); saveParticipant(p); }
    saveLocker(l); render();
  } else if (choice === '2') {
    l.working = !l.working;
    if (!l.working) l.status='broken'; else if (l.status==='broken') l.status='available';
    saveLocker(l); render();
  }
}

function toggleBarDuration(sel) {
  const grp = document.getElementById('bar-duration-group');
  const row = document.getElementById('bar-dates-row');
  if (sel.value === 'permanent') {
    if (grp) grp.style.display='none';
    if (row) row.style.display='none';
  } else {
    if (grp) grp.style.display='';
    if (row) row.style.display='';
    calcBarEndDate();
  }
}

function calcBarEndDate() {
  const durSel = document.querySelector('[name="duration"]');
  const startIn = document.querySelector('[name="startDate"]');
  const endIn = document.getElementById('bar-enddate');
  if (!durSel || !startIn || !endIn) return;
  if (durSel.value === 'custom') { endIn.removeAttribute('readonly'); return; }
  endIn.setAttribute('readonly','');
  const start = new Date(startIn.value || isoDate());
  start.setDate(start.getDate() + parseInt(durSel.value));
  endIn.value = start.toISOString().slice(0,10);
}

// Initialize bar end date on first render

async function doIssueBar(e, cat) {
  e.preventDefault();
  const f = e.target;
  const name = f.pname.value.trim().toLowerCase();
  const el = document.getElementById('ib-result');
  const p = S.data.participants.find(x=>!x.archived&&x.name.toLowerCase().includes(name));
  if (!p) { el.innerHTML='<div class="alert alert-warn">Participant not found.</div>'; return; }
  const endDate = f.type.value === 'permanent' ? null : (document.getElementById('bar-enddate')?.value || null);
  const bar = { id:genId(), type:f.type.value, reason:f.reason.value, comment:f.comment.value.trim(), startDate:f.startDate?.value||isoDate(), endDate, issued:true, issuedDate:isoDate(), changes:[] };
  p.barred = true;
  p.bars = [...(p.bars||[]), bar];
  await saveParticipant(p);

async function addUser(e) {
  e.preventDefault();
  const f = e.target;
  const name = f.uname.value.trim();
  const email = f.email.value.trim().toLowerCase();
  const password = f.password.value;
  const role = f.role.value;
  const res = document.getElementById('au-result');
  try {
    // Create Supabase Auth account for this staff member
    const signupRes = await fetch(`${SUPA_URL}/auth/v1/signup`, {
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const signupData = await signupRes.json();
    if (signupData.error) throw new Error(signupData.error.message||'Auth signup failed.');
    const authId = signupData.user?.id || signupData.id;
    // Store profile + role in sl_users (no password stored here)
    const newUser = { id:genId(), name, username:email, email, role, authId };
    S.data.users.push(newUser);
    await db.upsert('sl_users',{id:newUser.id,name,username:email,email,role,auth_id:authId||null});
    if (res) res.innerHTML=`<div class="alert alert-success">${esc(name)} added as ${role}. They can log in with ${esc(email)}.</div>`;
    f.reset();
    render();
  } catch(err) {
    if (res) res.innerHTML=`<div class="alert alert-danger">${esc(err.message)}</div>`;
  }
}

async function removeUser(uid, name) {
  if (!confirm(`Remove user "${name}"? This cannot be undone.`)) return;
  S.data.users = S.data.users.filter(u=>u.id!==uid);
  await db.delete('sl_users',`?id=eq.${uid}`);
  render();
}

async function resetUserPw(uid, name) {
  const u = S.data.users.find(x=>x.id===uid);
  if (!u) return;
  const email = u.email||u.username;
  if (!email||!email.includes('@')) { alert('No email on file for this user. Cannot send reset.'); return; }
  if (!confirm(`Send password reset email to ${email}?`)) return;
  const resetRes = await fetch(`${SUPA_URL}/auth/v1/recover`, {
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  const log = { id:genId(), targetUser:name, resetBy:S.user?.name||'Unknown', date:isoDate() };
  S.data.pwResetLog.unshift(log);
  await db.upsert('sl_pw_reset',{id:log.id,target_user:log.targetUser,reset_by:log.resetBy,date:log.date});
  alert(`Password reset email sent to ${email}.`);
  render();
}

function waSearch(cat) {
  const q = (document.getElementById('wa-q')?.value||'').trim().toLowerCase();

  if (!el) return;
  const p = S.data.participants.find(x=>!x.archived&&(x.name.toLowerCase().includes(q)||x.lockers?.some(l=>String(l)===q)));
  if (!p) { el.innerHTML='<div class="alert alert-warn">Not found.</div>'; return; }
  const today = isoDate();
  const upcoming = (p.workDates||[]).filter(d=>d>=today).sort();
  const past = (p.workDates||[]).filter(d=>d<today).sort().reverse().slice(0,5);
  const missed = p.missedShifts||[];
  const allDates = [...new Set([...upcoming, ...past])].sort();

    const isMissed = missed.includes(d);
    const isPast = d < today;
    return `<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border)">
      <span>${fmtDate(d)}</span>

        ${isPast&&!isMissed?`<button class="btn btn-sm btn-danger" onclick="markMissed('${p.id}','${d}')">Mark Missed</button>`:''}
        ${isPast&&isMissed?`<button class="btn btn-sm" onclick="unmarkMissed('${p.id}','${d}')">Unmark</button>`:''}
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="card">
    <div class="flex justify-between items-center mb-2">
      <div style="font-weight:700;font-size:15px">${esc(p.name)}</div>
      <span class="badge badge-blue">${upcoming.length} upcoming shifts</span>
    </div>
    <div class="info-row"><span class="info-lbl">Required</span><span>${p.workShiftsRequired} shift(s)/period</span></div>
    <div class="info-row"><span class="info-lbl">Missed</span><span>${missed.length}</span></div>
    <div class="mt-3">${dateRows||'<div style="color:var(--text3)">No shift dates on record.</div>'}</div>
    <div class="mt-3">
      <div class="form-group"><label>Add Work Date</label>

      </div>
      <button class="btn btn-primary btn-sm" onclick="addWorkDate('${p.id}')">Add Date</button>
    </div>
  </div>`;
}

function renderWorkSchedule(cat, editable) {
  const today = isoDate();
  const nextWeeks = [];
  for (let i=0;i<28;i++) {
    const d = new Date(); d.setDate(d.getDate()+i);
    nextWeeks.push(isoDate(d));
  }
  // Group participants by their next upcoming work date
  const byDate = {};
  S.data.participants.filter(p=>!p.archived).forEach(p=>{
    const next = (p.workDates||[]).filter(d=>d>=today).sort()[0];
    if (next) {
      if (!byDate[next]) byDate[next]=[];
      byDate[next].push(p);
    }
  });
  const sortedDates = Object.keys(byDate).sort().slice(0,15);
  const blocks = sortedDates.map(d=>{
    const ps = byDate[d];
    const rows = ps.map(p=>`<div class="flex items-center justify-between" style="padding:4px 0">
      <span style="font-size:13px">${esc(p.name)}</span>
      ${editable?`<button class="btn btn-sm" onclick="removeWorkDate('${p.id}','${d}')">Remove</button>`:''}
    </div>`).join('');
    return `<div class="card">
      <div class="flex justify-between items-center mb-2">
        <div style="font-weight:700">${fmtDate(d)}</div>
        <span class="badge badge-blue">${ps.length} worker${ps.length!==1?'s':''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
  return `<div class="screen">
    <div class="screen-title">${editable?'Edit ':''}Work Schedule</div>
    ${!sortedDates.length?'<div class="alert alert-info">No upcoming work dates on record.</div>':blocks}
  </div>`;
}

async function removeWorkDate(pid, date) {
  const p = S.data.participants.find(x=>x.id===pid);
  if (!p||!confirm(`Remove ${fmtDate(date)} from ${p.name}?`)) return;
  p.workDates=(p.workDates||[]).filter(d=>d!==date);
  p.mandatoryShifts=(p.mandatoryShifts||[]).filter(d=>d!==date);
  await saveParticipant(p);
  render();
}

function renderLunchSchedule(cat, editable) {
  const today = isoDate();

    .filter(p=>!p.archived&&p.powerLunchDate)
    .map(p=>({ ...p, daysUntil: daysBetween(today, p.powerLunchDate) }))

    const lbl = p.daysUntil<0?`${Math.abs(p.daysUntil)}d overdue`:p.daysUntil===0?'Today':`In ${p.daysUntil}d`;

function sundayComplianceBadge(daysSince, hasMeetings) {
  if (!hasMeetings) return '<span class="badge badge-gray">Never</span>';
  if (daysSince <= 20) return `<span class="badge badge-green">${daysSince}d — OK</span>`;
  if (daysSince <= 30) return `<span class="badge badge-yellow">${daysSince}d — Due Soon</span>`;
  return `<span class="badge badge-red">${daysSince}d — Overdue</span>`;
}

function renderSundayAttendance(cat, editable) {
  const meetings = [...S.data.sundayMeetings].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  const blocks = meetings.map(m=>{
    const attendees = m.attendees||[];
    const names = attendees.map(id=>{
      const p = S.data.participants.find(x=>x.id===id);
      return p?p.name:id;
    });
    const nameList = names.length
      ? names.map(n=>`<span class="badge badge-blue" style="margin:2px">${esc(n)}</span>`).join('')
      : '<span style="color:var(--text3);font-size:12px">No attendees recorded</span>';
    return `<div class="card">
      <div class="flex justify-between items-center mb-2">
        <div style="font-weight:700">${fmtDate(m.date)}</div>
        <span class="badge badge-gray">${attendees.length} present</span>
      </div>
      <div>${nameList}</div>
      ${editable?`<button class="btn btn-sm mt-2" onclick="editSundayMeeting('${m.id}')">Edit Attendees</button>`:''}
    </div>`;
  }).join('');

  // Compliance table: all active participants with days-since-last-attended
  const allDates = S.data.sundayMeetings.map(m=>m.date).sort();
  const compRows = S.data.participants.filter(p=>!p.archived).map(p=>{
    const attended = S.data.sundayMeetings
      .filter(m=>(m.attendees||[]).includes(p.id))
      .map(m=>m.date).sort();
    const lastDate = attended.length ? attended[attended.length-1] : null;
    const daysSince = lastDate ? daysBetween(lastDate, isoDate()) : null;
    const badge = sundayComplianceBadge(daysSince, lastDate!==null);
    return `<tr>
      <td style="font-weight:600">${esc(p.name)}</td>
      <td>${lastDate ? fmtDate(lastDate) : '—'}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');

  return `<div class="screen">
    <div class="screen-title">Sunday Meetings</div>
    ${editable?`<button class="btn btn-primary btn-sm mb-3" onclick="newSundayMeeting()">+ New Meeting</button>`:''}
    <div class="section-header">Compliance — All Participants</div>
    <div style="overflow-x:auto;margin-bottom:16px">
      <table><thead><tr><th>Participant</th><th>Last Attended</th><th>Status</th></tr></thead>
      <tbody>${compRows||'<tr><td colspan="3" style="color:var(--text3)">No participant data.</td></tr>'}</tbody>
    </table></div>
    <div class="section-header">Recent Meetings</div>
    ${blocks||'<div style="color:var(--text3)">No meetings recorded.</div>'}
    <div id="sunday-edit-area"></div>
  </div>`;
}

function newSundayMeeting() {
  const date = prompt('Date (YYYY-MM-DD):');
  if (!date) return;
  const m = { id:genId(), date, attendees:[] };
  S.data.sundayMeetings.push(m);
  db.upsert('sl_sunday_meetings',{id:m.id,date:m.date,attendees:m.attendees});
  editSundayMeeting(m.id);
  render();
}

function editSundayMeeting(mid) {
  const m = S.data.sundayMeetings.find(x=>x.id===mid);
  const el = document.getElementById('sunday-edit-area');
  if (!m||!el) return;
  const active = S.data.participants.filter(p=>!p.archived);
  const checkboxes = active.map(p=>{
    const checked = (m.attendees||[]).includes(p.id);
    return `<label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleSundayAttendee('${mid}','${p.id}',this.checked)">
      <span style="font-size:13px">${esc(p.name)}</span>
    </label>`;
  }).join('');
  el.innerHTML=`<div class="card mt-3">
    <h3>Edit Attendees — ${fmtDate(m.date)}</h3>
    <div style="max-height:300px;overflow-y:auto">${checkboxes}</div>
  </div>`;
}

async function toggleSundayAttendee(mid, pid, checked) {
  const m = S.data.sundayMeetings.find(x=>x.id===mid);
  if (!m) return;
  if (checked) { if (!m.attendees.includes(pid)) m.attendees.push(pid); }
  else { m.attendees=m.attendees.filter(x=>x!==pid); }
  await db.upsert('sl_sunday_meetings',{id:m.id,date:m.date,attendees:m.attendees});
}

function renderReports(cat, full) {
  const all = S.data.participants;
  const active = all.filter(p=>!p.archived);
  const barred = active.filter(p=>p.barred);
  const renewed = active.filter(p=>p.renewed);
  const notRenewed = active.filter(p=>!p.renewed&&!p.barred);
  const pendingRecs = S.data.barRecs.filter(r=>!r.barIssued&&!r.dismissed);
  const lockers = Object.values(S.data.lockers||{});
  const available = lockers.filter(l=>l.status==='available'&&l.working);
  const assigned = lockers.filter(l=>l.status==='assigned');
  const broken = lockers.filter(l=>!l.working);
  const today = isoDate();
  const ctr = S.data.checkInCounter;
  const todayCount = ctr.date===today?ctr.count:0;

  const statGrid = (items) => `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px">
    ${items.map(([val,lbl,color])=>`<div class="card" style="text-align:center;padding:12px">
      <div style="font-size:28px;font-weight:900;color:${color||'var(--accent)'}">${val}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${lbl}</div>
    </div>`).join('')}
  </div>`;

  let html = `<div class="screen">
    <div class="screen-title">${full?'Report Center':'Reports'}</div>
    <div class="section-header">Participants</div>
    ${statGrid([
      [active.length,'Total Active','var(--accent)'],
      [renewed.length,'Renewed','#38a169'],
      [notRenewed.length,'Not Yet Renewed','#d69e2e'],
      [barred.length,'Barred','#e53e3e'],
      [all.filter(p=>p.archived).length,'Archived','var(--text3)'],
    ])}
    <div class="section-header">Lockers</div>
    ${statGrid([
      [available.length,'Available','#38a169'],
      [assigned.length,'Assigned','var(--accent)'],
      [broken.length,'Broken','#e53e3e'],
    ])}
    <div class="section-header">Today</div>
    ${statGrid([
      [todayCount,'Check-ins Today','var(--accent)'],
      [pendingRecs.length,'Pending Bar Recs','#d69e2e'],
    ])}`;

  if (full) {
    // Participants needing renewal sorted by renewedThru
    const needsRenew = active.filter(p=>!p.renewed&&!p.barred&&p.renewedThru).sort((a,b)=>a.renewedThru.localeCompare(b.renewedThru)).slice(0,10);
    const renewRows = needsRenew.map(p=>`<tr>
      <td style="font-weight:600">${esc(p.name)}</td>
      <td>${fmtDate(p.renewedThru)}</td>
      <td>${(p.lockers||[]).map(l=>`<span class="badge badge-blue">#${l}</span>`).join(' ')}</td>
    </tr>`).join('');

    // Participants with missed shifts
    const missedWorkers = active.filter(p=>(p.missedShifts||[]).length>0).sort((a,b)=>b.missedShifts.length-a.missedShifts.length).slice(0,10);
    const missedRows = missedWorkers.map(p=>`<tr>
      <td style="font-weight:600">${esc(p.name)}</td>
      <td>${p.missedShifts.length}</td>
      <td>${(p.mandatoryShifts||[]).length} assigned</td>
    </tr>`).join('');

    // Upcoming power lunch overdue
    const lunchOverdue = active.filter(p=>p.powerLunchDate&&p.powerLunchDate<today).sort((a,b)=>a.powerLunchDate.localeCompare(b.powerLunchDate)).slice(0,10);
    const lunchRows = lunchOverdue.map(p=>`<tr>
      <td style="font-weight:600">${esc(p.name)}</td>
      <td>${fmtDate(p.powerLunchDate)}</td>
      <td>${Math.abs(daysBetween(today,p.powerLunchDate))} days overdue</td>
    </tr>`).join('');

    // Bar History
    const allBars = active.flatMap(p=>(p.bars||[]).map(b=>({...b,pName:p.name})))
      .sort((a,b)=>(b.issuedDate||b.startDate||'').localeCompare(a.issuedDate||a.startDate||''));
    const barRows = allBars.map(b=>`<tr>
      <td style="font-weight:600">${esc(b.pName)}</td>
      <td>${b.type==='permanent'?'<span class="badge badge-red">Permanent</span>':'<span class="badge badge-yellow">Temporary</span>'}</td>
      <td>${esc(b.reason||'')}</td>
      <td style="font-size:11px">${fmtDate(b.startDate||b.issuedDate)}</td>
      <td style="font-size:11px">${b.endDate?fmtDate(b.endDate):'—'}</td>
    </tr>`).join('');

    html += `
    <div class="section-header">Pending Renewal (oldest first)</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Renewed Thru</th><th>Lockers</th></tr></thead>
    <tbody>${renewRows||'<tr><td colspan="3" style="color:var(--text3)">All renewed</td></tr>'}</tbody></table></div>
    <div class="section-header mt-4">Missed Shifts</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Missed</th><th>Mandatory</th></tr></thead>
    <tbody>${missedRows||'<tr><td colspan="3" style="color:var(--text3)">None</td></tr>'}</tbody></table></div>
    <div class="section-header mt-4">Power Lunch Overdue</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Due Date</th><th>Status</th></tr></thead>
    <tbody>${lunchRows||'<tr><td colspan="3" style="color:var(--text3)">None overdue</td></tr>'}</tbody></table></div>
    <div class="section-header mt-4">Bar History</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Type</th><th>Reason</th><th>Start</th><th>End</th></tr></thead>
    <tbody>${barRows||'<tr><td colspan="5" style="color:var(--text3)">No bars issued</td></tr>'}</tbody></table></div>
    <div class="section-header mt-4">Power Lunch Report</div>
    <button class="btn btn-sm btn-primary" onclick="printPowerLunchReport()">Print Weekly Report</button>`;
  }

  html += '</div>';
  return html;
}

function printPowerLunchReport() {
  const today = new Date();
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const active = S.data.participants.filter(p=>!p.archived);
  const assigned = active.filter(p=>(p.lockers||[]).length>0);
  // Locker-days = sum of days each locker has been held this week
  const lockerDays = assigned.reduce((sum,p)=>{
    const since = p.memberSince||isoDate();
    const daysHeld = Math.min(7, daysBetween(since, isoDate()));
    return sum + ((p.lockers||[]).length * Math.max(0,daysHeld));
  },0);
  const bars = active.filter(p=>p.barred);
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Power Lunch Report</title>
  <style>body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;font-size:13px}
  h1{font-size:18px;margin-bottom:4px}h2{font-size:14px;margin-top:20px}
  table{width:100%;border-collapse:collapse;margin-top:8px}
  td,th{border:1px solid #ccc;padding:6px 8px;text-align:left}
  .sig{margin-top:40px;border-top:1px solid #000;padding-top:8px}
  @media print{button{display:none}}</style></head><body>
  <h1>SHARE Lockers — Power Lunch Weekly Report</h1>
  <p><strong>Week of:</strong> ${fmt(weekStart)} – ${fmt(weekEnd)}</p>
  <p><strong>Location / Address:</strong> _______________________________</p>
  <p><strong>Closures this week:</strong> _______</p>
  <h2>Summary</h2>
  <table><tr><th>Metric</th><th>Value</th></tr>
    <tr><td>Active Participants</td><td>${active.length}</td></tr>
    <tr><td>Locker Holders</td><td>${assigned.length}</td></tr>
    <tr><td>Total Locker Days (est.)</td><td>${lockerDays}</td></tr>
    <tr><td>Daily Average</td><td>${(lockerDays/7).toFixed(1)}</td></tr>
    <tr><td>Bars Issued This Week</td><td>_______</td></tr>
    <tr><td>Locker Opens This Week</td><td>_______</td></tr>
  </table>
  <h2>Daily Breakdown</h2>
  <table><thead><tr><th>Day</th><th>Date</th><th>Opens</th><th>Notes</th></tr></thead>
  <tbody>${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].map((day,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return `<tr><td>${day}</td><td>${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</td><td></td><td></td></tr>`;
  }).join('')}</tbody></table>
  <div class="sig">Staff Signature: ___________________________________ Date: _____________</div>
  <button onclick="window.print()">Print</button>
  </body></html>`);
  w.document.close();
}

function globalSearch(cat) {
  const q = (document.getElementById('sa-q')?.value||'').trim().toLowerCase();
  const el = document.getElementById('sa-result');
  if (!el||!q) return;

  const matchedParts = S.data.participants.filter(p=>
    p.name.toLowerCase().includes(q)||
    (p.lockers||[]).some(l=>String(l).includes(q))||
    (p.notes||'').toLowerCase().includes(q)
  );
  const matchedLockers = Object.values(S.data.lockers||{}).filter(l=>
    String(l.id).includes(q)||l.status.includes(q)||(l.notes||'').toLowerCase().includes(q)
  ).slice(0,20);
  const matchedBars = S.data.barRecs.filter(r=>
    (r.reason||'').toLowerCase().includes(q)||(r.notes||'').toLowerCase().includes(q)
  );

  const pHtml = matchedParts.length
    ? matchedParts.map(p=>`<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div>
          <span style="font-weight:700">${esc(p.name)}</span>

        </div>
        <button class="btn btn-sm" onclick="window._editPid='${p.id}'; nav(['${cat}','participants','edit'])">Edit</button>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">No participants matched.</div>';

  const lHtml = matchedLockers.length
    ? matchedLockers.map(l=>{
        const p = l.participantId?S.data.participants.find(x=>x.id===l.participantId):null;
        return `<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span class="badge ${l.status==='available'?'badge-green':l.status==='assigned'?'badge-red':'badge-gray'}">#${l.id}</span>
          ${p?`<span style="margin-left:6px">${esc(p.name)}</span>`:''}
        </div>`;
      }).join('')
    : '<div style="color:var(--text3);font-size:12px">No lockers matched.</div>';

  el.innerHTML=`
    <div class="section-header">Participants (${matchedParts.length})</div>
    <div class="card">${pHtml}</div>
    <div class="section-header mt-3">Lockers (${matchedLockers.length})</div>
    <div class="card">${lHtml}</div>`;
}

      <div class="form-group"><label>Participant (name search, optional)</label><input name="pname" placeholder="Type name…"></div>
      <div class="form-group"><label>Date</label><input name="date" type="date" value="${isoDate()}"></div>
      <button type="submit" class="btn btn-primary btn-sm">Add to List</button>
      <div id="bt-result" style="margin-top:8px"></div>
    </form>
    <div class="section-header">Archived — ${archived.length}</div>
    <div class="card">${archRows}</div>
  </div>`;
});

async function saveBagTagItem(e) {
  e.preventDefault();
  const f = e.target;
  const pname = f.pname.value.trim().toLowerCase();
  const p = pname ? S.data.participants.find(x=>x.name.toLowerCase().includes(pname)) : null;
  const item = { id:genId(), name:f.name.value.trim(), participantId:p?.id||null, date:f.date.value||isoDate(), barred:p?.barred||false, archived:false };
  S.data.bagTag.push(item);
  await db.upsert('sl_bag_tag',{id:item.id,participant_id:item.participantId,name:item.name,date:item.date,barred:item.barred});
  const res = document.getElementById('bt-result');
  if (res) res.innerHTML='<div class="alert alert-success">Item added.</div>';
  f.reset(); f.date.value=isoDate();
  render();
}

async function btIssueBar(btId) {
  const b = S.data.bagTag.find(x=>x.id===btId);
  if (!b || !b.participantId) return;
  const p = S.data.participants.find(x=>x.id===b.participantId);
  if (!p) return;
  if (!confirm(`Issue a 30-day Non-renewal bar to ${p.name}?`)) return;
  const endDate = new Date(); endDate.setDate(endDate.getDate()+30);
  const bar = { id:genId(), type:'temporary', reason:'Non-renewal', comment:'Issued from Bag & Tag', startDate:isoDate(), endDate:endDate.toISOString().slice(0,10), issued:true, issuedDate:isoDate() };
  p.barred = true;
  p.bars = [...(p.bars||[]), bar];
  b.barred = true;
  await saveParticipant(p);
  await db.upsert('sl_bar_recs',{id:genId(),participant_id:p.id,reason:'Non-renewal',date:isoDate(),bar_issued:true,bar_date:isoDate(),end_date:bar.endDate});
  await db.update('sl_bag_tag',{barred:true},`?id=eq.${btId}`);
  render();
}

async function btReleaseLockers(btId) {
  const b = S.data.bagTag.find(x=>x.id===btId);
  if (!b || !b.participantId) return;
  const p = S.data.participants.find(x=>x.id===b.participantId);
  if (!p || !(p.lockers||[]).length) return;
  if (!confirm(`Release all lockers (${p.lockers.join(', ')}) from ${p.name}? This will also set their work shifts required to 0.`)) return;
  p.lockers.forEach(lid => {
    const l = S.data.lockers[lid];
    if (l) { l.status='available'; l.participantId=null; l.releasedDate=isoDate(); }
  });
  p.lockers = [];
  p.workShiftsRequired = 0;
  await saveParticipant(p);
  render();
}

async function archiveBagTag(id) {
  if (!confirm('Archive this item?')) return;
  const b = S.data.bagTag.find(x=>x.id===id);
  if (!b) return;
  b.archived=true;
  await db.update('sl_bag_tag',{archived:true},`?id=eq.${id}`);
  render();
}

// ════════════════════════════════════════════════════
//  EC / CLERK — LOCKER RELEASE + BROKEN (standalone screens)
// ════════════════════════════════════════════════════
['EC','Clerk'].forEach(cat => {
  regScreen(`${cat}.lockers.release`, () => `
    <div class="screen">
      <div class="screen-title">Release Locker</div>
      <div class="card">
        <div class="form-group"><label>Locker Number (1–500)</label>
          <input id="lr-num" type="number" min="1" max="500" placeholder="e.g. 42">
        </div>
        <button class="btn btn-danger" onclick="releaseLockerById()">Release</button>
      </div>
      <div id="lr-result"></div>
    </div>`);

  regScreen(`${cat}.lockers.broken`, () => {
    const broken = Object.values(S.data.lockers||{}).filter(l=>!l.working);
    const rows = broken.length
      ? broken.map(l=>`<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border)">
          <span class="badge badge-red">#${l.id}</span>
          <span style="font-size:12px;color:var(--text3)">${l.notes||'No notes'}</span>
          <button class="btn btn-sm" onclick="markWorking(${l.id})">Mark Working</button>
        </div>`).join('')
      : '<div style="color:var(--text3)">No broken lockers.</div>';
    return `<div class="screen">
      <div class="screen-title">Broken Lockers</div>
      <div class="card">
        <div style="margin-bottom:12px">${rows}</div>
        <div class="form-group"><label>Mark Locker as Broken</label>
          <input id="lb-num" type="number" min="1" max="500" placeholder="Locker number">
        </div>
        <input id="lb-note" type="text" placeholder="Reason (optional)" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;margin-bottom:8px">
        <button class="btn btn-danger btn-sm" onclick="markBroken()">Mark as Broken</button>
      </div>
    </div>`;
  });
});

async function releaseLockerById() {
  const num = parseInt(document.getElementById('lr-num')?.value);
  const el = document.getElementById('lr-result');
  if (!num||num<1||num>500) { if(el) el.innerHTML='<div class="alert alert-warn">Enter a valid locker number.</div>'; return; }
  const l = S.data.lockers[num];
  if (!l) { if(el) el.innerHTML='<div class="alert alert-warn">Locker not found.</div>'; return; }
  if (l.status==='available') { if(el) el.innerHTML='<div class="alert alert-info">Already available.</div>'; return; }
  const p = l.participantId?S.data.participants.find(x=>x.id===l.participantId):null;
  if (!confirm(`Release locker #${num}${p?' from '+p.name:''}?`)) return;
  l.status='available'; l.participantId=null; l.releasedDate=isoDate();
  await saveLocker(l);
  if (p) { p.lockers=(p.lockers||[]).filter(x=>x!==num); p.workShiftsRequired=p.lockers.length; await saveParticipant(p); }
  if(el) el.innerHTML=`<div class="alert alert-success">Locker #${num} released.</div>`;
  render();
}

async function markWorking(id) {
  const l = S.data.lockers[id];
  if (!l) return;
  l.working=true; l.status='available';
  await saveLocker(l);
  render();
}

async function markBroken() {
  const num = parseInt(document.getElementById('lb-num')?.value);
  if (!num||num<1||num>500) { alert('Enter a valid locker number.'); return; }
  const l = S.data.lockers[num];
  if (!l) { alert('Locker not found.'); return; }
  l.working=false; l.status='broken';
  l.notes = document.getElementById('lb-note')?.value||l.notes||'';
  await saveLocker(l);
  render();
}

// ════════════════════════════════════════════════════
//  EC / CLERK — PARTICIPANT ARCHIVE SCREEN
// ════════════════════════════════════════════════════
['EC','Clerk'].forEach(cat => {
  regScreen(`${cat}.participants.archive`, () => {
    const archived = S.data.participants.filter(p=>p.archived);
    const rows = archived.length
      ? archived.map(p=>`<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border)">
          <div>
            <span style="font-weight:700">${esc(p.name)}</span>
            <span style="font-size:11px;color:var(--text3);margin-left:8px">Member since ${fmtDate(p.memberSince)}</span>
          </div>
          <button class="btn btn-sm" onclick="unarchiveParticipant('${p.id}','${cat}')">Restore</button>
        </div>`).join('')
      : '<div style="color:var(--text3)">No archived participants.</div>';
    return `<div class="screen">
      <div class="screen-title">Archived Participants</div>
      <div class="card">${rows}</div>
    </div>`;
  });
});

async function unarchiveParticipant(pid, cat) {
  const p = S.data.participants.find(x=>x.id===pid);
  if (!p||!confirm(`Restore ${p.name}?`)) return;
  p.archived=false;
  await saveParticipant(p);
  render();
}

// Alias: users.reset_pw standalone screen
['EC','Clerk'].forEach(cat => {
  regScreen(`${cat}.users.reset_pw`, () => SCREENS[`${cat}.users.manage`]());
});

// section-header CSS used in reports
// ════════════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════════════
function render() {
  applyTheme();
  document.getElementById('hdr').innerHTML = renderHeader();
  document.getElementById('map-wrap').innerHTML = renderMap();

  const leaf = isLeaf(S.path);
  const treeWrap = document.getElementById('tree-wrap');
  treeWrap.innerHTML = renderBreadcrumb() + (leaf ? renderScreen(S.path) : renderTree());

  document.getElementById('cmd-wrap').innerHTML = renderCmdBar();

  // Scroll chat to bottom if visible
  const feed = document.getElementById('chat-feed');
  if (feed) feed.scrollTop = feed.scrollHeight;

  // Auto-trigger search/filter if a cmdSearchQuery was set from command bar
  if (S.cmdSearchQuery) {
    const q = S.cmdSearchQuery;
    S.cmdSearchQuery = '';
    // Participant filter
    const psq = document.getElementById('ps-q');
    if (psq) { psq.value = q; filterParticipants(q); }
    // Global search
    const saq = document.getElementById('sa-q');
    if (saq) { saq.value = q; globalSearch(S.path[0]||'EC'); }
  }

  // Start chat poll if EC/Clerk logged in
  if (S.user && (S.user.role==='ec'||S.user.role==='clerk')) startChatPoll();
}

// ════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS (global) — Sage_OS Command Protocol v1
//  /  or Ctrl+K     → focus command bar
//  Ctrl+←           → go up one level
//  Ctrl+→           → go into first child
//  Ctrl+Home        → go to dictionary root
//  Esc (in cmdbar, text) → clear text
//  Esc (in cmdbar, empty) → go up one level
//  Backspace (in cmdbar, empty) → go up one level
// ════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  const tag = active?.tagName;
  const inCmdInput = active?.id === 'cmd-input';
  const inInput = (tag==='INPUT' || tag==='TEXTAREA') && !inCmdInput;

  // Focus command bar
  if ((e.key==='/' && !inInput && !inCmdInput) ||
      ((e.key==='k'||e.key==='K') && e.ctrlKey)) {
    e.preventDefault();
    focusCmdInput();
    return;
  }
  // Level navigation (works from anywhere except text inputs)
  if (!inInput) {
    if (e.key==='ArrowLeft' && e.ctrlKey) {
      e.preventDefault();
      if (S.path.length) nav(S.path.slice(0,-1));
      return;
    }
    if (e.key==='ArrowRight' && e.ctrlKey) {
      e.preventDefault();
      const children = getChildren(S.path);
      if (children.length) treeClick(children[0].path);
      return;
    }
    if (e.key==='Home' && e.ctrlKey) {
      e.preventDefault();
      nav([]);
      return;
    }
  }
});

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
(async function init() {
  applyTheme();
  render();
  await loadAll();
  render();
})();
</script>
