function addEC(){const name=(document.getElementById('ec-name')||{value:''}).value.trim();const email=(document.getElementById('ec-email')||{value:''}).value.trim();const pw=(document.getElementById('ec-pw')||{value:''}).value;const role=(document.getElementById('ec-role')||{value:'ec'}).value;if(!name||!email||!pw){alert('Fill all fields.');return}if((S.users||[]).find(u=>u.email.toLowerCase()===email.toLowerCase())){alert('Email already exists.');return}if(!S.users)S.users=[];S.users.push({id:'u'+Date.now(),role,name,email,password:pw});save();render();toast(name+' added as '+role)}
function removeEC(id){if(id===S.currentUser?.id){alert("Can't remove your own account.");return}if(!confirm('Remove this account?'))return;S.users=S.users.filter(u=>u.id!==id);save();render();toast('Account removed.')}
function expireBars(){S.participants.forEach(p=>{(p.bars||[]).forEach(b=>{if(!b.permanent&&parseDate(b.endDate)<SYS_DATE)b.expired=true})});refreshAll();save();render();toast('Past bars expired.')}

// ── MODALS ─────────────────────────────────────────────────────────────────
function openModal(type,id){
  const fn={
    'view-participant':()=>mViewP(id),'add-participant':()=>mAddP(),
    'take-attendance':()=>renderAttendanceModal(),'assign-locker':()=>mAssignLocker(id),
    'bar':()=>mBar(id),'renew':()=>mRenew(id),'missed-date':()=>mMissedDate(id),
    'adjust-credits':()=>mAdjCredits(id),'checkin-log':()=>mCheckinLog(id),
    'broadcast':()=>mBroadcast(),'locker-issue':()=>mLockerIssue(),
    'assign-work-date':()=>mAssignWorkDate(id),'move-to-past':()=>mMoveToPast(id),'submit-meeting-notes':()=>mSubmitMeetingNotes(),
  }[type];
  if(!fn)return;
  let root=document.getElementById('_modal');if(!root){root=document.createElement('div');root.id='_modal';document.body.appendChild(root)}
  root.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${fn()}</div></div>`;
  setTimeout(()=>{const c=document.getElementById('chat-scroll');if(c)c.scrollTop=c.scrollHeight},50);
}
function closeModal(){const r=document.getElementById('_modal');if(r)r.innerHTML=''}

// ── VIEW PARTICIPANT MODAL ─────────────────────────────────────────────────
function mViewP(id){
  const p=S.participants.find(x=>x.id===id);if(!p)return'<p>Not found</p>';
  const cm=monthKey(SYS_DATE);
  const assignedThisMo=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});
  const checkedIn=(S.attendance||[]).filter(a=>a.participantId===p.id&&a.type==='work'&&monthKey(parseDate(a.recordedDate||a.date)||SYS_DATE)===cm).map(a=>a.recordedDate||a.date);
  const metCount=assignedThisMo.filter(d=>checkedIn.includes(d)).length;
  const deficit=p.lockers.length-metCount;
  const activeBars=(p.bars||[]).filter(b=>b.permanent||(parseDate(b.endDate)>=SYS_DATE&&!b.expired));
  const rd=parseDate(p.renewalDate);const dl=rd?daysBetween(SYS_DATE,rd):null;
  const lm=lastMtgDate(id);
  return`<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
    <div class="avatar" style="width:48px;height:48px;font-size:18px">${p.first[0]}${p.last[0]}</div>
    <div><div style="font-size:17px;font-weight:500">${p.first} ${p.last}</div><div style="font-size:12px;color:#888">${p.email} · Since ${fmtDate(p.firstDate)}</div></div>
    <span class="badge badge-${p.status}" style="margin-left:auto">${p.status}</span>
  </div>
  ${p.isPast?'<div class="alert alert-warning"><i class="ti ti-user-off"></i> This is a past participant.</div>':''}
  ${p.statusReason?`<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> ${p.statusReason}</div>`:''}
  ${dl!==null&&dl<=7&&dl>=0?`<div class="alert alert-warning"><i class="ti ti-calendar"></i> Renewal due in ${dl} days</div>`:''}
  ${activeBars.length?`<div class="alert alert-danger"><i class="ti ti-ban"></i> ${activeBars.map(b=>b.reason+(b.permanent?' (permanent)':' until '+fmtDate(b.endDate))).join('; ')}</div>`:''}
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0">
    <div class="metric"><div class="metric-label">Credits</div><div class="metric-value">${p.credits||0}</div></div>
    <div class="metric"><div class="metric-label">Lockers</div><div class="metric-value">${p.lockers.length}</div></div>
    <div class="metric"><div class="metric-label">Work met</div><div class="metric-value" style="color:${deficit<=0?'#3b6d11':'#e24b4a'}">${metCount}/${p.lockers.length}</div></div>
    <div class="metric"><div class="metric-label">Last meeting</div><div class="metric-value" style="font-size:12px">${lm?fmtDate(lm):'—'}</div></div>
  </div>
  <div class="divider"></div>
  <div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:5px">Active lockers</div>
    ${p.lockers.map(n=>`<span class="pill-locker" style="cursor:pointer" onclick="if(confirm('Unassign locker #${n} from ${p.first}?'))doUnassignLocker(${n},'${p.id}')">#${n} ×</span>`).join('')||'<span style="color:#888;font-size:12px">None</span>'}
    ${p.barredLockers?.length?`<div style="margin-top:5px;font-size:12px;color:#854f0b">Barred: ${p.barredLockers.map(n=>'#'+n).join(', ')}</div>`:''}
  </div>
  <div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:5px">Assigned work dates this month</div>
    ${assignedThisMo.length?assignedThisMo.map(d=>{const met=checkedIn.includes(d);return`<span class="tag" style="background:${met?'#eaf3de':'#fcebeb'};color:${met?'#3b6d11':'#a32d2d'}">${fmtDate(d)} ${met?'✓':'✗'}</span>`}).join(''):'<span style="color:#888;font-size:12px">None this month</span>'}
    ${deficit>0?`<span class="badge badge-inactive" style="margin-left:6px">${deficit} more needed</span>`:''}
  </div>
  <div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:5px">Compliance</div>
    <span class="badge ${p.meetingStatus?'badge-active':'badge-inactive'}">Meeting ${p.meetingStatus?'✓':'✗'}</span>
    <span class="badge ${p.plStatus?'badge-active':'badge-inactive'}" style="margin-left:4px">PL ${p.plStatus?'✓':'✗'}</span>
  </div>
  ${(p.bars||[]).length?`<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:5px">Bar history</div>${p.bars.map(b=>`<div style="font-size:12px;padding:3px 0;border-bottom:.5px solid rgba(0,0,0,.07)"><span style="color:${b.permanent?'#a32d2d':'#854f0b'}">${b.permanent?'Permanent':fmtDate(b.startDate)+'–'+fmtDate(b.endDate)}</span>: ${b.reason} <span style="color:#aaa;font-size:10px">(${b.issuedBy||'EC'})</span></div>`).join('')}</div>`:''}
  <div class="divider"></div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    ${!p.isPast?`
    <button class="btn btn-sm" onclick="openModal('assign-locker','${p.id}')"><i class="ti ti-lock-plus"></i> Assign locker</button>
    <button class="btn btn-sm" onclick="openModal('renew','${p.id}')"><i class="ti ti-refresh"></i> Renew</button>
    <button class="btn btn-sm" onclick="openModal('assign-work-date','${p.id}')"><i class="ti ti-calendar-plus"></i> Assign work date</button>
    <button class="btn btn-sm btn-danger" onclick="closeModal();openModal('bar','${p.id}')"><i class="ti ti-ban"></i> Bar</button>
    <button class="btn btn-sm" onclick="openModal('missed-date','${p.id}')"><i class="ti ti-alert-triangle"></i> Missed date</button>
    ${isClerk()?`<button class="btn btn-sm" onclick="openModal('adjust-credits','${p.id}')"><i class="ti ti-coin"></i> Credits</button>`:''}
    <button class="btn btn-sm btn-warning" onclick="openModal('move-to-past','${p.id}')"><i class="ti ti-user-off"></i> Move to past</button>`:'<button class="btn btn-sm btn-success" onclick="reinstateP(\''+p.id+'\')" >Reinstate</button>'}
    <button class="btn btn-sm" onclick="openModal('checkin-log','${p.id}')"><i class="ti ti-history"></i> Log</button>
    <button class="btn btn-sm" onclick="closeModal()">Close</button>
  </div>`;
}

// ── ADD PARTICIPANT MODAL ──────────────────────────────────────────────────
function mAddP(){return`<div class="modal-title"><i class="ti ti-user-plus"></i> Add participant</div>
  <div class="form-row"><div class="form-group"><label class="form-label">First name *</label><input type="text" id="np-first"></div><div class="form-group"><label class="form-label">Last name *</label><input type="text" id="np-last"></div></div>
  <div class="form-group"><label class="form-label">Email *</label><input type="email" id="np-email"></div>
  <div class="form-row"><div class="form-group"><label class="form-label">PIN *</label><input type="text" id="np-pin" maxlength="6" placeholder="4–6 digits"></div><div class="form-group"><label class="form-label">Lockers to assign</label><select id="np-lk"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div></div>
  <div class="form-row"><div class="form-group"><label class="form-label">First date</label><input type="date" id="np-fd" value="${todayStr()}"></div><div class="form-group"><label class="form-label">Renewal date</label><input type="date" id="np-rd"></div></div>
  <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doAddP()">Add participant</button></div>`}
function doAddP(){const first=(document.getElementById('np-first')||{value:''}).value.trim();const last=(document.getElementById('np-last')||{value:''}).value.trim();const email=(document.getElementById('np-email')||{value:''}).value.trim();const pin=(document.getElementById('np-pin')||{value:''}).value.trim();const numL=parseInt((document.getElementById('np-lk')||{value:'1'}).value)||1;const fd=(document.getElementById('np-fd')||{value:todayStr()}).value||todayStr();const rd=(document.getElementById('np-rd')||{value:todayStr()}).value||todayStr();if(!first||!last||!email||!pin){alert('Fill required fields.');return}const avail=S.lockers.filter(l=>l.status==='available'&&l.working);if(avail.length<numL){alert('Only '+avail.length+' lockers available.');return}const assigned=avail.slice(0,numL).map(l=>l.number);const id='p'+Date.now();S.participants.push({id,first,last,email,pin,role:'participant',lockers:assigned,barredLockers:[],credits:0,renewalDate:rd,firstDate:fd,assignedWorkDates:[],bars:[],status:'inactive',statusReason:'New participant',notes:'',missedDateWarnings:[],creditLog:[],isPast:false});assigned.forEach(n=>{const l=S.lockers.find(x=>x.number===n);if(l){l.status='active';l.assignedTo=id}});audit('ADD_PARTICIPANT',id,'New participant added: '+first+' '+last);refreshAll();save();closeModal();S.page='participants';render();toast('Added: '+first+' '+last)}

// ── ASSIGN LOCKER MODAL ────────────────────────────────────────────────────
function mAssignLocker(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';const avail=S.lockers.filter(l=>l.status==='available'&&l.working);if(p.lockers.length>=3)return`<div class="modal-title">Assign locker</div><div class="alert alert-danger">Maximum 3 lockers reached.</div><button class="btn btn-sm" onclick="closeModal()">Close</button>`;return`<div class="modal-title"><i class="ti ti-lock-plus"></i> Assign locker — ${p.first} ${p.last}</div><div class="alert alert-info">Has ${p.lockers.length} locker(s). Max 3. ${avail.length} available in inventory.</div><div class="form-group"><label class="form-label">Select locker</label><select id="lk-pick"><option value="">— choose —</option>${avail.slice(0,100).map(l=>`<option value="${l.number}">#${l.number}</option>`).join('')}</select></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doAssign('${id}')">Assign</button></div>`}
function doAssign(id){const n=parseInt((document.getElementById('lk-pick')||{value:''}).value);if(!n){alert('Select a locker.');return}const p=S.participants.find(x=>x.id===id);const l=S.lockers.find(x=>x.number===n);if(!p||!l||l.status!=='available'){alert('Locker not available.');return}l.status='active';l.assignedTo=id;p.lockers.push(n);audit('ASSIGN_LOCKER',id,'Locker #'+n+' assigned');refreshAll();save();closeModal();openModal('view-participant',id);toast('Locker #'+n+' assigned to '+p.first)}

// ── ASSIGN WORK DATE MODAL ─────────────────────────────────────────────────
function mAssignWorkDate(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';const cm=monthKey(SYS_DATE);const thisMonthDates=(p.assignedWorkDates||[]).filter(d=>{const pd=parseDate(d);return pd&&monthKey(pd)===cm});return`<div class="modal-title"><i class="ti ti-calendar-plus"></i> Assign work date — ${p.first} ${p.last}</div>
  <div class="alert alert-info"><i class="ti ti-info-circle"></i> Assign a date for this participant to check in for a work shift. They must check in on this exact date to keep their locker active. They have ${p.lockers.length} locker(s), so they need ${p.lockers.length} work date(s) per month.</div>
  <div style="margin-bottom:12px"><div style="font-size:12px;font-weight:500;margin-bottom:6px">Already assigned this month (${thisMonthDates.length}/${p.lockers.length}):</div>
    ${thisMonthDates.length?thisMonthDates.map(d=>`<span class="tag">${fmtDate(d)} <span onclick="removeWorkDate('${id}','${d}')" style="cursor:pointer;opacity:.7">×</span></span>`).join(''):'<span style="color:#888;font-size:12px">None</span>'}
  </div>
  <div class="form-group"><label class="form-label">New date to assign</label><input type="date" id="awd-date" value="${todayStr()}"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doAssignWorkDate('${id}')">Assign date</button></div>`}
function doAssignWorkDate(id){const d=(document.getElementById('awd-date')||{value:todayStr()}).value;if(!d){alert('Select a date.');return}const p=S.participants.find(x=>x.id===id);if(!p)return;if(!p.assignedWorkDates)p.assignedWorkDates=[];if(p.assignedWorkDates.includes(d)){alert('Date already assigned.');return}p.assignedWorkDates.push(d);audit('ASSIGN_WORK_DATE',id,'Work date assigned: '+fmtDate(d));refreshAll();save();closeModal();openModal('view-participant',id);toast('Work date assigned: '+fmtDate(d))}
function removeWorkDate(id,d){const p=S.participants.find(x=>x.id===id);if(!p)return;p.assignedWorkDates=(p.assignedWorkDates||[]).filter(x=>x!==d);audit('REMOVE_WORK_DATE',id,'Work date removed: '+fmtDate(d));refreshAll();save();closeModal();openModal('view-participant',id);toast('Work date removed.')}

// ── BAR MODAL ─────────────────────────────────────────────────────────────
function mBar(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';const end30=addDays(todayStr(),30);return`<div class="modal-title"><i class="ti ti-ban"></i> Issue bar — ${p.first} ${p.last}</div><div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> A bar means the participant loses access to their locker and its contents. Temporary bars auto-expire after 30 days but remain on record. Only ECs/Clerks can issue bars.</div><div class="form-group"><label class="form-label">Bar type</label><select id="bar-type" onchange="document.getElementById('bar-end-row').style.display=this.value==='permanent'?'none':'block'"><option value="temporary">Temporary (30 days)</option><option value="permanent">Permanent</option></select></div><div class="form-group" id="bar-end-row"><label class="form-label">End date</label><input type="date" id="bar-end" value="${end30}"></div><div class="form-group"><label class="form-label">Reason *</label><input type="text" id="bar-reason" placeholder="Describe the violation or reason"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-danger" onclick="doBar('${id}')"><i class="ti ti-ban"></i> Issue bar</button></div>`}
function doBar(id){const p=S.participants.find(x=>x.id===id);if(!p)return;const type=(document.getElementById('bar-type')||{value:'temporary'}).value;const reason=(document.getElementById('bar-reason')||{value:''}).value.trim();if(!reason){alert('Enter a reason.');return}const end=type==='temporary'?(document.getElementById('bar-end')||{value:addDays(todayStr(),30)}).value:null;if(!p.bars)p.bars=[];p.bars.push({id:'b'+Date.now(),startDate:todayStr(),endDate:end,permanent:type==='permanent',reason,issuedBy:S.currentUser?.name||'EC'});audit('BAR_ISSUED',id,(type==='permanent'?'Permanent':'Temp')+ ' bar issued: '+reason);refreshAll();save();closeModal();render();toast('Bar issued to '+p.first+' '+p.last)}

// ── RENEW MODAL ───────────────────────────────────────────────────────────
function mRenew(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';const nm=new Date(SYS_DATE);nm.setMonth(nm.getMonth()+1);const nr=nm.getFullYear()+'-'+String(nm.getMonth()+1).padStart(2,'0')+'-15';return`<div class="modal-title"><i class="ti ti-refresh"></i> Renew — ${p.first} ${p.last}</div><div class="alert alert-info">Current renewal: ${fmtDate(p.renewalDate)}. New renewal sets the date by which they must renew again next month (by the 15th).</div><div class="form-group"><label class="form-label">New renewal date</label><input type="date" id="rn-date" value="${nr}"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doRenew('${id}')">Confirm renewal</button></div>`}
function doRenew(id){const d=(document.getElementById('rn-date')||{value:''}).value;if(!d){alert('Select date.');return}const p=S.participants.find(x=>x.id===id);if(!p)return;p.renewalDate=d;audit('RENEWAL',id,'Renewed — new date: '+fmtDate(d));refreshAll();save();closeModal();render();toast('Renewed: '+p.first+' → '+fmtDate(d))}

// ── MISSED DATE MODAL ─────────────────────────────────────────────────────
function mMissedDate(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';const deadline=addDays(todayStr(),14);const openWarn=(p.missedDateWarnings||[]).some(w=>!w.resolved);return`<div class="modal-title"><i class="ti ti-alert-triangle"></i> Mark missed date — ${p.first} ${p.last}</div><div class="alert alert-warning">Issues a 14-day warning. If the participant doesn't check in with a replacement date within 14 days, a 30-day bar is automatically applied.</div>${openWarn?`<div class="alert alert-danger">Already has an open warning. Resolve it first.</div>`:''}<div class="form-group"><label class="form-label">Missed work date</label><input type="date" id="md-date" value="${todayStr()}"></div><p style="font-size:12px;color:#888;margin-bottom:12px">Replacement deadline: <b>${fmtDate(deadline)}</b></p><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-danger" ${openWarn?'disabled':''} onclick="doMissedDate('${id}')">Issue warning</button></div>`}
function doMissedDate(id){const p=S.participants.find(x=>x.id===id);if(!p)return;if((p.missedDateWarnings||[]).some(w=>!w.resolved)){alert('Resolve existing warning first.');return}const d=(document.getElementById('md-date')||{value:todayStr()}).value||todayStr();if(!p.missedDateWarnings)p.missedDateWarnings=[];const dl=addDays(todayStr(),14);p.missedDateWarnings.push({missedDate:d,deadline:dl,resolved:false,issuedDate:todayStr()});audit('MISSED_DATE_WARNING',id,'Missed date warning: '+fmtDate(d)+', deadline '+fmtDate(dl));refreshAll();save();closeModal();toast('Warning issued — 14-day deadline set.')}

// ── ADJUST CREDITS MODAL (Clerk only) ─────────────────────────────────────
function mAdjCredits(id){
  if(!isClerk()){return`<div class="modal-title">Credits</div><div class="alert alert-danger">Only Clerk (Admin) accounts can adjust credits.</div><button class="btn btn-sm" onclick="closeModal()">Close</button>`}
  const p=S.participants.find(x=>x.id===id);if(!p)return'';
  const log=(p.creditLog||[]).slice().reverse().slice(0,10);
  return`<div class="modal-title"><i class="ti ti-coin"></i> Adjust credits — ${p.first} ${p.last}</div>
  <div class="alert alert-info">Credits are earned by working extra shifts. One credit covers one deficit shift in a month. Only Clerk (Admin) can manually adjust.</div>
  <div class="metric" style="margin-bottom:14px"><div class="metric-label">Current balance</div><div class="metric-value" id="cr-display">${p.credits||0}</div></div>
  <div class="form-group"><label class="form-label">Adjustment (+ to add, − to deduct)</label><input type="number" id="cr-adj" value="0" oninput="updateCrPreview('${id}')"></div>
  <div class="form-group"><label class="form-label">Reason *</label><input type="text" id="cr-reason" placeholder="Extra shift, data correction, etc."></div>
  <div style="font-size:12px;color:#888;margin-bottom:12px">New balance after adjustment: <b id="cr-new">${p.credits||0}</b></div>
  ${log.length?`<div style="font-size:12px;font-weight:500;margin-bottom:6px">Recent adjustments</div><div style="max-height:160px;overflow-y:auto;margin-bottom:12px">${log.map(c=>`<div style="font-size:12px;padding:4px 0;border-bottom:.5px solid rgba(0,0,0,.07)"><span style="color:${c.adj>0?'#3b6d11':'#e24b4a'};font-weight:500">${c.adj>0?'+':''}${c.adj}</span> by <b>${c.by||'?'}</b> on ${fmtDate(c.date)}: ${c.reason||''} → balance: ${c.balance}</div>`).join('')}</div>`:''}
  <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doAdjCredits('${id}')">Apply</button></div>`;
}
function updateCrPreview(id){const p=S.participants.find(x=>x.id===id);if(!p)return;const adj=parseInt((document.getElementById('cr-adj')||{value:0}).value)||0;const el=document.getElementById('cr-new');if(el)el.textContent=Math.max(0,(p.credits||0)+adj)}
function doAdjCredits(id){const p=S.participants.find(x=>x.id===id);if(!p)return;if(!isClerk()){alert('Only Clerk (Admin) can adjust credits.');return}const adj=parseInt((document.getElementById('cr-adj')||{value:0}).value)||0;const reason=(document.getElementById('cr-reason')||{value:''}).value.trim();if(!reason){alert('Enter a reason.');return}const newVal=Math.max(0,(p.credits||0)+adj);p.credits=newVal;if(!p.creditLog)p.creditLog=[];p.creditLog.push({date:todayStr(),adj,by:S.currentUser?.name||'Clerk',reason,balance:newVal});audit('CREDIT_ADJUST',id,'Credits '+(adj>=0?'+':'')+adj+' by '+S.currentUser?.name+': '+reason+' → balance '+newVal);refreshAll();save();closeModal();toast('Credits updated: '+p.first+' now has '+p.credits)}

// ── CHECK-IN LOG MODAL ────────────────────────────────────────────────────
function mCheckinLog(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';const logs=(S.attendance||[]).filter(a=>a.participantId===id).slice().sort((a,b)=>new Date(b.date+b.time)-new Date(a.date+a.time)).slice(0,50);return`<div class="modal-title"><i class="ti ti-history"></i> Attendance log — ${p.first} ${p.last}</div><div style="font-size:12px;color:#888;margin-bottom:8px">Showing last ${logs.length} of ${(S.attendance||[]).filter(a=>a.participantId===id).length} records (5-year archive)</div>${logs.length?`<div style="display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto">${logs.map(a=>{const lbl={'work':'Work shift','meeting':'Meeting','power-lunch':'Power Lunch','locker-checkin':'Check-in'}[a.type]||a.type;return`<div class="ci-entry"><span class="tl-dot" style="background:${ciColor(a.type)}"></span><div style="flex:1"><b>${fmtDate(a.recordedDate||a.date)}</b> <span style="color:#888;font-size:11px">entered ${fmtDate(a.date)} ${a.time||''}</span></div><span class="badge badge-pending" style="font-size:10px">${lbl}</span></div>`}).join('')}</div>`:'<p style="color:#888;font-size:13px">No records.</p>'}<div style="text-align:right;margin-top:12px"><button class="btn btn-sm" onclick="closeModal()">Close</button></div>`}

// ── BROADCAST MODAL ────────────────────────────────────────────────────────
function mBroadcast(){return`<div class="modal-title"><i class="ti ti-speakerphone"></i> Broadcast to all participants</div><div class="alert alert-info">Sends a message to every participant's inbox.</div><div class="form-group"><label class="form-label">Message</label><textarea id="bc-msg" rows="4" placeholder="Type announcement…" style="resize:none"></textarea></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doBroadcast()"><i class="ti ti-send"></i> Send to all</button></div>`}
function doBroadcast(){const txt=(document.getElementById('bc-msg')||{value:''}).value.trim();if(!txt){alert('Enter a message.');return}if(!S.messages)S.messages=[];S.participants.filter(p=>!p.isPast).forEach(p=>{S.messages.push({id:'m'+Date.now()+p.id,participantId:p.id,text:txt,date:todayStr(),fromRole:S.currentUser.role,read:false,broadcast:true})});audit('BROADCAST','all','Broadcast sent: '+txt.slice(0,60));save();closeModal();toast('Broadcast sent to '+S.participants.filter(p=>!p.isPast).length+' participants.')}

// ── LOCKER ISSUE MODAL ─────────────────────────────────────────────────────
function mLockerIssue(){return`<div class="modal-title"><i class="ti ti-tool"></i> Report locker issue</div><div class="form-row"><div class="form-group"><label class="form-label">Locker number</label><input type="number" id="li-num" min="1" max="400" placeholder="e.g. 14"></div><div class="form-group"><label class="form-label">Action</label><select id="li-action"><option value="broken">Mark broken</option><option value="fixed">Mark fixed/working</option></select></div></div><div class="form-group"><label class="form-label">Problem description</label><input type="text" id="li-desc" placeholder="e.g. broken latch"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-primary" onclick="doLockerIssue()">Submit</button></div>`}
function doLockerIssue(){const n=parseInt((document.getElementById('li-num')||{value:0}).value);const action=(document.getElementById('li-action')||{value:'broken'}).value;const desc=(document.getElementById('li-desc')||{value:''}).value;if(!n){alert('Enter locker number.');return}const l=S.lockers.find(x=>x.number===n);if(!l){alert('Locker #'+n+' not found.');return}if(action==='broken'){l.working=false;l.problem=desc||'reported broken';if(!l.assignedTo)l.status='broken'}else{l.working=true;l.problem='';if(l.status==='broken')l.status='available'}audit('LOCKER_ISSUE','',action+' locker #'+n+(desc?': '+desc:''));save();closeModal();render();toast('Locker #'+n+' updated.')}

// ── MOVE TO PAST MODAL ─────────────────────────────────────────────────────
function mMoveToPast(id){const p=S.participants.find(x=>x.id===id);if(!p)return'';return`<div class="modal-title"><i class="ti ti-user-off"></i> Move to past — ${p.first} ${p.last}</div><div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> This will release all their lockers and remove them from active participants. They can be reinstated later. This action is logged.</div><div class="form-group"><label class="form-label">Reason</label><input type="text" id="mtp-reason" placeholder="Voluntary exit, program completion, etc."></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-danger" onclick="doMoveToPast('${id}')"><i class="ti ti-user-off"></i> Confirm</button></div>`}
function doMoveToPast(id){const reason=(document.getElementById('mtp-reason')||{value:''}).value.trim()||'Moved by EC';closeModal();moveToPast(id,reason)}

// ── BOOT ───────────────────────────────────────────────────────────────────
loadState();
runMonthEndCreditApply();
refreshAll();
render();
</script>
</body>
</html>
